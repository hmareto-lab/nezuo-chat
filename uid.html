<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>UID CHECK</title>

<style>
body{
  margin:0;
  font-family:system-ui;
  background:linear-gradient(135deg,#d7dde5,#b8c2cf);
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.box{
  width:90%;
  max-width:420px;
  background:rgba(255,255,255,.25);
  backdrop-filter:blur(14px);
  border-radius:18px;
  padding:20px;
  box-shadow:0 10px 30px rgba(0,0,0,.1);
}

h2{
  margin:0 0 15px;
  text-align:center;
}

.item{
  margin:12px 0;
  padding:10px;
  background:rgba(255,255,255,.4);
  border-radius:12px;
  word-break:break-all;
}

.label{
  font-size:12px;
  opacity:.6;
}

.value{
  font-weight:700;
  font-size:14px;
}

button{
  width:100%;
  margin-top:10px;
  padding:12px;
  border:none;
  border-radius:12px;
  background:#2c313a;
  color:#fff;
  font-weight:700;
}
</style>
</head>

<body>

<div class="box">

  <h2>UID CHECK</h2>

  <div class="item">
    <div class="label">YOUR UID</div>
    <div class="value" id="uid">---</div>
  </div>

  <div class="item">
    <div class="label">NAME</div>
    <div class="value" id="name">---</div>
  </div>

  <div class="item">
    <div class="label">ADMIN STATUS</div>
    <div class="value" id="admin">---</div>
  </div>

  <button onclick="copyUID()">UIDコピー</button>

</div>

<script>

const ADMIN_UID = "ここにFirebaseUID";

let uid = localStorage.getItem("uid");
if(!uid){
  uid = crypto.randomUUID();
  localStorage.setItem("uid", uid);
}

let name = localStorage.getItem("userName") || "名無し";

document.getElementById("uid").textContent = uid;
document.getElementById("name").textContent = name;

const isAdmin = uid === ADMIN_UID;

document.getElementById("admin").textContent =
isAdmin ? "YES（管理者）" : "NO（一般ユーザー）";

function copyUID(){
  navigator.clipboard.writeText(uid);
  alert("UIDコピーした");
}

</script>

</body>
</html>
