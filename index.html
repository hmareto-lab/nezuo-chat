<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>NEZUO CHAT v48 FULL STABLE</title>

<style>
html,body{
  margin:0;
  height:100%;
  overflow:hidden;
  background:#e9edf2;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
}

/* =====================
   HEADER
===================== */
#header{
  position:fixed;
  top:0;
  left:0;
  right:0;
  z-index:9999;

  background:#1f2328;
  padding:calc(env(safe-area-inset-top) + 10px) 10px 10px;
  display:flex;
  gap:8px;
}

#nameInput,#msgInput{
  flex:1;
  min-width:0;
  border:none;
  outline:none;
  border-radius:10px;
  padding:10px;
}

/* =====================
   CHAT
===================== */
#chatWrap{
  position:fixed;
  top:60px;
  bottom:60px;
  left:0;
  right:0;

  overflow-y:auto;
  -webkit-overflow-scrolling:touch;
  overscroll-behavior:contain;

  padding:14px;
  display:flex;
  flex-direction:column;
  gap:10px;
}

/* =====================
   FOOTER
===================== */
#footer{
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  z-index:9999;

  background:#1f2328;
  padding:10px 10px calc(10px + env(safe-area-inset-bottom));

  display:grid;
  grid-template-columns:60px 60px 1fr 60px 60px;
  gap:8px;
  align-items:center;
}

button{
  height:42px;
  border:none;
  border-radius:10px;
  background:#111;
  color:#fff;
}

/* =====================
   MESSAGE
===================== */
.msg{
  max-width:78%;
  padding:10px 12px;
  border-radius:16px;
  font-size:14px;
  word-break:break-word;
}

.me{ background:#95ec69; align-self:flex-end; }
.other{ background:#fff; align-self:flex-start; }
.system{ background:#c9ced6; align-self:center; font-size:12px; }

/* =====================
   BADGE
===================== */
#newBadge{
  background:#444;
  color:#fff;
  font-size:12px;
  padding:6px 10px;
  border-radius:14px;
  min-width:34px;
  text-align:center;
  user-select:none;
  cursor:pointer;
  opacity:0.35;
}

#newBadge.active{
  background:#ff3b30;
  opacity:1;
}

.hidden{ display:none !important; }

.title{
  color:#fff;
  text-align:center;
  font-size:13px;
}
</style>
</head>

<body>

<!-- HEADER -->
<div id="header">
  <input id="nameInput" placeholder="名前" autocomplete="off" />
  <button id="joinBtn">入室</button>

  <input id="msgInput" placeholder="メッセージ" class="hidden" autocomplete="off" />
  <button id="sendBtn" class="hidden">送信</button>
</div>

<!-- CHAT -->
<div id="chatWrap"></div>

<!-- FOOTER -->
<div id="footer">
  <div id="newBadge">0</div>
  <button id="upBtn">↑</button>
  <div class="title">NEZUO CHAT v48</div>
  <button id="downBtn">↓</button>
  <button id="exitBtn" class="hidden">退出</button>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
import {
  getDatabase,
  ref,
  push,
  onChildAdded,
  query,
  limitToLast
} from "https://www.gstatic.com/firebasejs/9.23.0/firebase-database.js";

/* =====================
   FIREBASE
===================== */
const app = initializeApp({
  apiKey:"AIzaSyApju_6KuGq8EkXqPI0aTOysFmZ22vL5HQ",
  authDomain:"nezubo2.firebaseapp.com",
  databaseURL:"https://nezubo2-default-rtdb.firebaseio.com",
  projectId:"nezubo2"
});

const db = getDatabase(app);

/* ★安定化：limitOnly */
const chatRef = query(ref(db,"chat"), limitToLast(80));

let uid = localStorage.getItem("uid") || crypto.randomUUID();
localStorage.setItem("uid", uid);

/* =====================
   STATE
===================== */
const state = {
  userName:"",
  newCount:0,
  lastSend:0
};

/* =====================
   DOM
===================== */
const chatWrap=document.getElementById("chatWrap");
const nameInput=document.getElementById("nameInput");
const msgInput=document.getElementById("msgInput");
const joinBtn=document.getElementById("joinBtn");
const sendBtn=document.getElementById("sendBtn");
const exitBtn=document.getElementById("exitBtn");
const badge=document.getElementById("newBadge");
const upBtn=document.getElementById("upBtn");
const downBtn=document.getElementById("downBtn");

/* =====================
   SCROLL
===================== */
const isTop = () => chatWrap.scrollTop < 20;
const goTop = () => chatWrap.scrollTop = 0;

/* =====================
   SAFE GUARDS（v48）
===================== */
function canSend(){
  const now = Date.now();
  if(now - state.lastSend < 1200) return false;
  state.lastSend = now;
  return true;
}

function safeLength(text){
  return text.length <= 500;
}

/* =====================
   BADGE
===================== */
function updateBadge(){
  badge.textContent = state.newCount;
  badge.classList.toggle("active", state.newCount > 0);
}

badge.onclick = () => {
  state.newCount = 0;
  updateBadge();
  goTop();
};

/* =====================
   UI STATE
===================== */
function syncUI(){
  const inRoom = !!state.userName;

  nameInput.classList.toggle("hidden", inRoom);
  joinBtn.classList.toggle("hidden", inRoom);

  msgInput.classList.toggle("hidden", !inRoom);
  sendBtn.classList.toggle("hidden", !inRoom);

  exitBtn.classList.toggle("hidden", !inRoom);
}

/* =====================
   JOIN
===================== */
function join(){
  const n = nameInput.value.trim();
  if(!n) return;

  state.userName = n;

  push(ref(db,"chat"),{
    uid,
    name:"system",
    text:`${n} 入室`,
    time:Date.now()
  });

  syncUI();
  goTop();
  state.newCount = 0;
  updateBadge();
}

/* =====================
   SEND
===================== */
function send(){
  if(!state.userName) return;

  const t = msgInput.value.trim();
  if(!t) return;

  if(!canSend()) return;
  if(!safeLength(t)) return;

  push(ref(db,"chat"),{
    uid,
    name:state.userName,
    text:t,
    time:Date.now()
  });

  msgInput.value="";
}

/* =====================
   EXIT
===================== */
exitBtn.onclick = () => {
  const name = state.userName;
  if(!name) return;

  push(ref(db,"chat"),{
    uid,
    name:"system",
    text:`${name} 退出`,
    time:Date.now()
  });

  state.userName="";
  syncUI();
};

/* =====================
   RECEIVE
===================== */
onChildAdded(chatRef,(snap)=>{

  const d = snap.val();
  const mine = d.uid === uid;

  const div = document.createElement("div");

  div.className =
    d.name === "system"
      ? "msg system"
      : mine
        ? "msg me"
        : "msg other";

  div.innerHTML =
    d.name === "system"
      ? d.text
      : mine
        ? d.text
        : `<b>${d.name}</b><br>${d.text}`;

  chatWrap.prepend(div);

  if(isTop()){
    state.newCount = 0;
  }else{
    state.newCount++;
  }

  updateBadge();
});

/* =====================
   SCROLL
===================== */
chatWrap.addEventListener("scroll",()=>{
  if(isTop()){
    state.newCount = 0;
    updateBadge();
  }
});

/* =====================
   BUTTONS
===================== */
joinBtn.onclick = join;
sendBtn.onclick = send;

upBtn.onclick = () => {
  goTop();
  state.newCount = 0;
  updateBadge();
};

downBtn.onclick = () => {
  chatWrap.scrollTop = chatWrap.scrollHeight;
};

document.addEventListener("keydown",(e)=>{
  if(e.key !== "Enter") return;

  if(document.activeElement === nameInput) join();
  if(document.activeElement === msgInput) send();
});

</script>

</body>
</html>
