<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
    <title>NEZUO ONETIME CHAT</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <style>
        *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
        :root{ --primary:#007aff; --bg:#f2f4f7; --accent:#28a745; --danger:#d9363e; --dark:#2c3e50; }
        html,body{ margin:0; width:100%; height:100%; overflow:hidden; background:var(--bg); font-family:-apple-system,sans-serif; }
        body{ display:flex; justify-content:center; } 
        #lobby, #mainApp { display:none; }
        #mainApp{ flex-direction:column; width:100%; height:100svh; max-width:800px; background:#fff; position:relative; }
        #header{ background:#fff; border-bottom:1px solid #ececec; padding-top:env(safe-area-inset-top); z-index:10; }
        .app-header-top{ display:flex; align-items:flex-end; gap:8px; padding:12px; }
        textarea{ flex:1; height:42px; min-height:42px; max-height:120px; padding:10px 15px; border:none; outline:none; resize:none; background:#f1f3f5; border-radius:20px; font-size:16px; line-height:1.4; overflow-y:hidden; }
        #sendBtn{ width:70px; height:42px; border:none; border-radius:20px; background:var(--primary); color:#fff; font-weight:800; cursor:pointer; }
        #sendBtn:disabled{ background:#ccc; }
        .room-info-bar{ display:flex; justify-content:space-between; align-items:center; padding:6px 12px; border-top:1px solid #f6f6f6; background:#fcfcfc; }
        .info-item{ background:#f1f1f1; padding:3px 8px; border-radius:5px; font-size:10px; font-weight:700; color:#666; }
        #presenceList{ display:flex; gap:5px; overflow-x:auto; }
        .user-chip{ white-space:nowrap; font-size:10px; font-weight:700; color:var(--primary); background:#e1eeff; padding:2px 8px; border-radius:10px; }
        #chatWrap{ flex:1; overflow-y:auto; padding:15px 12px; background:#f7f8fa; display:flex; flex-direction:column; }
        #list{ display:flex; flex-direction:column-reverse; gap:12px; }
        .msg-wrap{ display: flex; flex-direction: column; animation: fadeIn 0.2s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-5px); } to { opacity: 1; transform: translateY(0); } }
        .msg{ background:#fff; border-radius:18px; padding:8px 14px; max-width:85%; box-shadow:0 1px 2px rgba(0,0,0,.05); }
        .msg-text{ font-size:15px; line-height:1.5; white-space:pre-wrap; word-break:break-word; }
        .msg-text a { color: var(--primary); text-decoration: underline; }
        .msg-meta{ font-size:10px; color:#999; margin:4px 0 0 8px; }
        .sys-msg { align-self: center; color: #aaa; font-size: 11px; font-weight: bold; margin: 5px 0; }
        #footer{ background:#fff; border-top:1px solid #ececec; padding:8px 10px calc(8px + env(safe-area-inset-bottom)); }
        .footer-nav{ display:grid; grid-template-columns: 60px 44px 44px 1.2fr 80px; gap:8px; align-items: center; }
        .btn{ border:none; border-radius:12px; display:flex; align-items:center; justify-content:center; font-weight:800; height:42px; cursor:pointer; text-align:center; line-height:1.1; }
        #lobby{ position:fixed; inset:0; justify-content:center; align-items:center; background:linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%); z-index:1000; }
        .lobby-content{ width:90%; max-width:380px; background:#fff; border-radius:28px; padding:25px; box-shadow:0 20px 40px rgba(0,0,0,0.15); }
        .lobby-input{ width:100%; height:44px; border:1px solid #eee; border-radius:12px; background:#f9fbff; padding:0 15px; font-size:16px; outline:none; margin-bottom:12px; }
    </style>
</head>
<body>

<div id="lobby">
    <div class="lobby-content">
        <h2 style="text-align:center; color:var(--primary); margin:0 0 15px;">NEZUO ONETIME CHAT</h2>
        <input id="ni" class="lobby-input" maxlength="10" placeholder="名前">
        <input id="tk" class="lobby-input" placeholder="なりすまし防止コード">
        <div id="tp" style="font-size:10px; color:var(--accent); text-align:right; margin-top:-10px; height:15px;"></div>
        <input id="ri" class="lobby-input" placeholder="部屋ID">
        <input id="pi" class="lobby-input" placeholder="パスワード">
        <button id="masterGenBtn" style="width:100%; height:40px; background:none; border:1px dashed var(--primary); border-radius:12px; color:var(--primary); margin-bottom:10px;">🎲 自動生成</button>
        <button id="enterBtn" style="width:100%; height:50px; border:none; border-radius:15px; background:var(--primary); color:#fff; font-size:18px; font-weight:900;">入室</button>
    </div>
</div>

<div id="mainApp">
    <header id="header">
        <div class="app-header-top">
            <textarea id="mi" rows="1" placeholder="メッセージ..." maxlength="500"></textarea>
            <button id="sendBtn">送信</button>
        </div>
        <div class="room-info-bar"><div id="roomDisplay" class="info-item"></div><div id="presenceList"></div></div>
    </header>
    <main id="chatWrap"><div id="list"></div></main>
    <footer id="footer">
        <div class="footer-nav">
            <button id="focusBtn" class="btn" style="background:var(--primary); color:#fff; font-size:20px;">⌨️</button>
            <button id="toTopBtn" class="btn" style="background:#f0f2f5;">↑</button>
            <button id="toBottomBtn" class="btn" style="background:#f0f2f5;">↓</button>
            <button id="copyBtn" class="btn" style="background:var(--dark); color:#fff; font-size:9px;">招待用<br>URLコピー</button>
            <button id="exitBtn" class="btn" style="background:#fff0f0; color:var(--danger); font-size:12px;">退室</button>
        </div>
    </footer>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
import { getDatabase, ref, push, onValue, set, remove, onDisconnect, query, onChildAdded, get } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-database.js";

const db = getDatabase(initializeApp({ apiKey: "AIzaSyApju_6KuGq8EkXQPI0aTOysFmZ22vL5HQ", databaseURL: "https://nezubo2-default-rtdb.firebaseio.com" }));
const uid = localStorage.getItem("nezu_uid") || crypto.randomUUID();
localStorage.setItem("nezu_uid", uid);

const $ = id => document.getElementById(id);
let curR, curP, curN, rawR, rawP, lastT = 0;
const EXPIRE_MS = 30 * 60 * 1000; 

const hash = t => CryptoJS.SHA256(t).toString();
const enc = (t, k) => CryptoJS.AES.encrypt(t, k).toString();
const dec = (c, k) => { try { return CryptoJS.AES.decrypt(c, k).toString(CryptoJS.enc.Utf8) || "???"; } catch(e) { return "不可"; } };
const esc = t => (t||"").replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

async function checkAndCleanup(roomId) {
    const lastRef = ref(db, `last_activity/${roomId}`);
    const snap = await get(lastRef);
    if (snap.exists() && Date.now() - snap.val() > EXPIRE_MS) {
        await remove(ref(db, `chat/${roomId}`));
        await remove(ref(db, `presence/${roomId}`));
        await remove(lastRef);
        return true;
    }
    return false;
}

function renderMsg(m, p) {
    const time = new Date(m.time).toLocaleTimeString([], {hour:'2-digit',minute:'2-digit',second:'2-digit'});
    const div = document.createElement("div");
    div.className = "msg-wrap";
    if(m.type === "sys") {
        div.innerHTML = `<div class="sys-msg">${esc(dec(m.text, p))} (${time})</div>`;
    } else {
        div.innerHTML = `<div style="margin-left:10px;margin-bottom:2px;"><span style="font-size:11px;font-weight:800;color:#666;">${esc(dec(m.nEnc, p))}</span></div>
            <div class="msg"><div class="msg-text">${esc(dec(m.text, p)).replace(/(https?:\/\/[\w\/:%#\$&\?\(\)~\.=\+\-]+)/g, '<a href="$1" target="_blank" rel="noopener noreferrer">$1</a>')}</div></div>
            <div class="msg-meta">${time}</div>`;
    }
    $("list").appendChild(div);
}

async function join(r, p, n, skip = false) {
    if(!r || !p) return;
    rawR = r; rawP = p;
    curR = hash(r); curP = p; curN = n;
    
    if (await checkAndCleanup(curR)) {
        if(!skip) alert("この部屋は30分間動きがなかったため消滅しました。");
        sessionStorage.clear(); location.reload(); return;
    }

    const pRef = ref(db, `presence/${curR}/${uid}`);
    set(pRef, { nEnc: enc(n.split('◆')[0], p), last: Date.now() });
    onDisconnect(pRef).remove();
    
    if(!skip) {
        push(ref(db, `chat/${curR}`), { type: "sys", text: enc(`${n.split('◆')[0]} が入室`, p), time: Date.now() });
        sessionStorage.setItem("nezu_active_session", JSON.stringify({ r, p, n }));
        set(ref(db, `last_activity/${curR}`), Date.now());
    }

    $("roomDisplay").innerText = r;
    $("lobby").style.display = "none"; $("mainApp").style.display = "flex";
    
    let lastKey = "";
    const chatRef = ref(db, `chat/${curR}`);
    const snap = await get(chatRef);
    if (snap.exists()) {
        const msgs = snap.val();
        Object.keys(msgs).forEach(k => {
            renderMsg(msgs[k], p);
            lastKey = k;
        });
        $("chatWrap").scrollTop = 0;
    }

    onChildAdded(chatRef, s => {
        if (s.key > lastKey) {
            renderMsg(s.val(), p);
            $("chatWrap").scrollTop = 0;
        }
    });

    onValue(ref(db, `presence/${curR}`), s => {
        const now = Date.now(), data = s.val() || {};
        $("presenceList").innerHTML = Object.values(data).filter(u => now - u.last < EXPIRE_MS).map(u => `<span class="user-chip">● ${esc(dec(u.nEnc, p))}</span>`).join("");
    });

    setInterval(async () => {
        if(!curR) return;
        set(pRef, { nEnc: enc(curN.split('◆')[0], curP), last: Date.now() });
        if (await checkAndCleanup(curR)) {
            alert("30分間発言がなかったため、部屋を閉じました。");
            sessionStorage.clear(); location.reload();
        }
    }, 60000);
}

async function send() {
    const now = Date.now(), m = $("mi").value.trim();
    if(!m || !curR || now - lastT < 500) return;
    lastT = now;
    $("sendBtn").disabled = true;
    setTimeout(() => $("sendBtn").disabled = false, 500);
    await push(ref(db, `chat/${curR}`), { nEnc: enc(curN, curP), text: enc(m, curP), time: now });
    set(ref(db, `last_activity/${curR}`), now);
    set(ref(db, `presence/${curR}/${uid}`), { nEnc: enc(curN.split('◆')[0], curP), last: now });
    $("mi").value = ""; $("mi").style.height = "42px";
    $("chatWrap").scrollTop = 0;
}

$("mi").onkeydown = e => { if(e.key === "Enter" && !e.shiftKey && !e.isComposing) { e.preventDefault(); send(); } };
$("sendBtn").onclick = send;
const updateTrip = async () => {
    if(!$("tk").value) return $("tp").innerText = "";
    const b = await crypto.subtle.digest("SHA-256", new TextEncoder().encode($("tk").value));
    $("tp").innerText = "◆" + Array.from(new Uint8Array(b)).map(x => x.toString(36)).join("").substring(2, 8);
};
$("tk").oninput = updateTrip;

$("enterBtn").onclick = () => {
    const r = $("ri").value.trim(), p = $("pi").value.trim(), n = $("ni").value.trim() || "名無し";
    if(r && p) {
        localStorage.setItem("nezu_name", $("ni").value);
        localStorage.setItem("nezu_tk", $("tk").value);
        join(r, p, n + $("tp").innerText);
    } else {
        alert("部屋IDとパスワードを入力してください。");
    }
};
$("masterGenBtn").onclick = () => { $("ri").value = Math.random().toString(36).slice(2, 10); $("pi").value = Math.random().toString(36).slice(2, 12); };

// コピーボタンの修正箇所
$("copyBtn").onclick = async () => {
    const rVal = rawR || $("ri").value.trim();
    const pVal = rawP || $("pi").value.trim();
    if(!rVal || !pVal) return alert("部屋IDとパスワードが設定されていません。");
    const url = `${location.origin}${location.pathname}?r=${encodeURIComponent(rVal)}&p=${encodeURIComponent(pVal)}`;
    
    let success = false;
    // 手法1: モダンなAPI
    if (navigator.clipboard && navigator.clipboard.writeText) {
        try {
            await navigator.clipboard.writeText(url);
            success = true;
        } catch (e) { success = false; }
    }
    
    // 手法2: 古いAPIへのフォールバック（iOS/Androidの互換性確保）
    if (!success) {
        try {
            const ta = document.createElement("textarea");
            ta.value = url;
            ta.style.position = "fixed"; ta.style.left = "-9999px"; ta.style.top = "0";
            document.body.appendChild(ta);
            ta.focus(); ta.select(); ta.setSelectionRange(0, 99999); // iOS対策
            success = document.execCommand('copy');
            document.body.removeChild(ta);
        } catch (e) { success = false; }
    }

    if (success) {
        const b = $("copyBtn"); const old = b.innerHTML;
        b.innerText = "完了！"; b.style.background = "var(--accent)";
        setTimeout(() => { b.innerHTML = old; b.style.background = "var(--dark)"; }, 2000);
    } else {
        alert("URLを直接コピーしてください: " + url);
    }
};

$("exitBtn").onclick = async () => {
    if(curR) {
        try {
            await push(ref(db, `chat/${curR}`), { type: "sys", text: enc(`${curN.split('◆')[0]} が退室`, curP), time: Date.now() });
            await remove(ref(db, `presence/${curR}/${uid}`));
        } catch(e) { console.log("Exit error"); }
    }
    sessionStorage.clear(); location.href = location.origin + location.pathname;
};
$("toBottomBtn").onclick = () => $("chatWrap").scrollTop = $("chatWrap").scrollHeight;
$("toTopBtn").onclick = () => $("chatWrap").scrollTop = 0;
$("focusBtn").onclick = () => { $("chatWrap").scrollTop = 0; $("mi").focus(); };

window.onload = async () => {
    $("ni").value = localStorage.getItem("nezu_name") || "";
    $("tk").value = localStorage.getItem("nezu_tk") || "";
    await updateTrip();
    const s = sessionStorage.getItem("nezu_active_session");
    const p = new URLSearchParams(window.location.search);
    if(s) { 
        const d = JSON.parse(s); join(d.r, d.p, d.n, true); 
    } else {
        $("lobby").style.display = "flex";
        if(p.get('r') && p.get('p')) {
            $("ri").value = p.get('r'); $("pi").value = p.get('p');
            $("masterGenBtn").style.display="none";
        }
    }
};
</script>
</body>
</html>
