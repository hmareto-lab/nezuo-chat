<!DOCTYPE html>  
<html lang="ja">  
<head>  
<meta charset="UTF-8" />  
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />  
<title>NEZUO CHAT v62 FLEX NAME + UID TAG</title>  

<style>  
html,body{  
  margin:0;  
  height:100%;  
  overflow:hidden;  
  background:#e9edf2;  
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;  
}  

#header{  
  position:fixed;  
  top:0;left:0;right:0;  
  z-index:9999;  
  background:#1f2328;  
  padding:calc(env(safe-area-inset-top) + 10px) 10px 10px;  
  display:flex;  
  gap:8px;  
}  

#msgInput{  
  flex:1;  
  min-width:0;  
  border:none;  
  outline:none;  
  border-radius:10px;  
  padding:10px;  
}  

button{  
  height:42px;  
  border:none;  
  border-radius:10px;  
  background:#111;  
  color:#fff;  
}  

#sendBtn{width:60px;}  

/* 名前ボタン（可変） */  
#nameBtn{  
  background:#4da3ff;  
  padding:0 12px;  
  width:auto;  
  min-width:60px;  
  max-width:180px;  
  white-space:nowrap;  
  overflow:hidden;  
  text-overflow:ellipsis;  
}  

#chatWrap{  
  position:fixed;  
  top:60px;  
  bottom:60px;  
  left:0;right:0;  
  overflow-y:auto;  
  -webkit-overflow-scrolling:touch;  
  padding:14px;  
  display:flex;  
  flex-direction:column;  
  gap:10px;  
}  

.msg{  
  max-width:78%;  
  padding:10px 12px;  
  border-radius:16px;  
  font-size:14px;  
  word-break:break-word;  
}  

.me{background:#95ec69;align-self:flex-end;}  
.other{background:#fff;align-self:flex-start;}  
.system{background:#c9ced6;align-self:center;font-size:12px;}  

#footer{  
  position:fixed;  
  bottom:0;left:0;right:0;  
  z-index:9999;  
  background:#1f2328;  
  padding:10px 10px calc(10px + env(safe-area-inset-bottom));  
  display:grid;  
  grid-template-columns:60px 60px 1fr auto;  
  gap:8px;  
  align-items:center;  
}  
</style>  
</head>  

<body>  

<div id="header">  
  <input id="msgInput" placeholder="メッセージ" />  
  <button id="sendBtn">送信</button>  
  <div></div>  
</div>  

<div id="chatWrap"></div>  

<div id="footer">  
  <button id="upBtn">↑</button>  
  <button id="downBtn">↓</button>  
  <div></div>  
  <button id="nameBtn"></button>  
</div>  

<script type="module">  

import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";  
import { getDatabase, ref, push, onChildAdded, query, limitToLast }  
from "https://www.gstatic.com/firebasejs/9.23.0/firebase-database.js";  

const app = initializeApp({  
  apiKey:"AIzaSyApju_6KuGq8EkXqPI0aTOysFmZ22vL5HQ",  
  authDomain:"nezubo2.firebaseapp.com",  
  databaseURL:"https://nezubo2-default-rtdb.firebaseio.com",  
  projectId:"nezubo2"  
});  

const db = getDatabase(app);  
const chatRef = query(ref(db,"chat"), limitToLast(80));  

/* =========================  
   UID  
========================= */  
let uid = localStorage.getItem("uid") || crypto.randomUUID();  
localStorage.setItem("uid", uid);  

let userName = localStorage.getItem("userName") || "名無し";  

let uidTag = "";  

/* =========================  
   SHA256 → タグ生成  
========================= */  
async function makeTag(input){  
  const enc = new TextEncoder();  
  const buf = await crypto.subtle.digest("SHA-256", enc.encode(input));  

  return "#" + [...new Uint8Array(buf)]  
    .map(b => b.toString(16).padStart(2,"0"))  
    .join("")  
    .slice(0,6)  
    .toUpperCase();  
}  

async function initTag(){  
  uidTag = await makeTag(uid);  
  updateNameUI();  
}  

/* =========================  
   UI  
========================= */  
const chatWrap=document.getElementById("chatWrap");  
const msgInput=document.getElementById("msgInput");  
const sendBtn=document.getElementById("sendBtn");  
const nameBtn=document.getElementById("nameBtn");  

function updateNameUI(){  
  nameBtn.textContent = `${userName} ${uidTag}`;  
}  

function changeName(){  
  const n = prompt("名前を変更");  
  if(!n) return;  

  userName = n.trim();  
  localStorage.setItem("userName", userName);  
  updateNameUI();  
}  

/* =========================  
   送信  
========================= */  
function send(){  
  const t = msgInput.value.trim();  
  if(!t) return;  

  push(ref(db,"chat"),{  
    uid,  
    name:userName,  
    tag:uidTag,  
    text:t,  
    time:Date.now()  
  });  

  msgInput.value="";  
}  

/* =========================  
   表示  
========================= */  
onChildAdded(chatRef,(snap)=>{  
  const d = snap.val();  

  const div = document.createElement("div");  
  const mine = d.uid === uid;  

  div.className = mine ? "msg me" : "msg other";  

  const name = document.createElement("b");  
  name.textContent = `${d.name} ${d.tag || ""}`;  

  const br = document.createElement("br");  
  const text = document.createElement("div");  
  text.textContent = d.text;  

  div.appendChild(name);  
  div.appendChild(br);  
  div.appendChild(text);  

  chatWrap.prepend(div);  
});  

/* =========================  
   scroll  
========================= */  
upBtn.onclick = ()=> chatWrap.scrollTop = 0;  
downBtn.onclick = ()=> chatWrap.scrollTop = chatWrap.scrollHeight;  

/* =========================  
   events  
========================= */  
sendBtn.onclick = send;  
nameBtn.onclick = changeName;  

msgInput.addEventListener("keydown",(e)=>{  
  if(e.key==="Enter"){  
    e.preventDefault();  
    send();  
  }  
});  

/* init */  
updateNameUI();  
initTag();  

</script>  

</body>  
</html>
