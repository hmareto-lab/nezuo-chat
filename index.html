<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
<title>NEZU ONETIME CHAT</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>

<style>
*{
    box-sizing:border-box;
    -webkit-tap-highlight-color:transparent;
}

:root{
    --primary:#007aff;
    --bg:#f2f4f7;
    --accent:#28a745;
    --danger:#d9363e;
    --dark:#2c3e50;
}

html,body{
    margin:0;
    width:100%;
    height:100%;
    overflow:hidden;
    background:var(--bg);
    font-family:-apple-system,sans-serif;
}

body{
    display:flex;
    justify-content:center;
}

#lobby,#mainApp{
    display:none;
}

#mainApp{
    flex-direction:column;
    width:100%;
    height:100svh;
    max-width:800px;
    background:#fff;
    position:relative;
}

#lobby{
    position:fixed;
    inset:0;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#f5f7fa,#c3cfe2);
    z-index:1000;
    display:flex;
}

.lobby-content{
    width:90%;
    max-width:380px;
    background:#fff;
    border-radius:28px;
    padding:25px;
    box-shadow:0 20px 40px rgba(0,0,0,.15);
    display:flex;
    flex-direction:column;
    gap:12px;
    max-height:95vh;
    overflow-y:auto;
}

.lobby-input{
    width:100%;
    height:46px;
    border:1px solid #eee;
    border-radius:12px;
    background:#f9fbff;
    padding:0 15px;
    font-size:16px;
    outline:none;
}

.error-msg{
    color:var(--danger);
    font-size:12px;
    font-weight:bold;
    text-align:center;
    display:none;
    background:#fff0f0;
    padding:10px;
    border-radius:12px;
    border:1px solid #ffdada;
}

.info-box{
    background:#f8f9fa;
    border-radius:16px;
    padding:15px;
    font-size:13px;
    line-height:1.6;
    color:#495057;
    border:1px solid #efefef;
}

#header{
    background:#fff;
    border-bottom:1px solid #ececec;
    padding-top:env(safe-area-inset-top);
}

.app-header-top{
    display:flex;
    align-items:flex-end;
    gap:8px;
    padding:10px 12px;
    background:#fff;
}

.input-container {
    display:flex;
    align-items:center;
    flex:1;
    min-width:0;
    background:#f1f3f5;
    border-radius:20px;
    padding:4px 12px;
    border:none !important; 
    box-shadow:none !important;
    transition:background-color 0.2s ease;
}

.input-container:focus-within {
    border:none !important;
    box-shadow:none !important;
    background:#f1f3f5;
}

textarea{
    flex:1;
    min-width:0;
    height:24px;
    min-height:24px;
    max-height:96px;
    padding:2px 0;
    background:transparent;
    font-size:15px;
    line-height:1.4;
    color:#212529;
    border:none !important;
    outline:none !important;
    resize:none;
    overflow-y:auto;
    -webkit-appearance:none;
}

textarea::placeholder {
    color:#adb5bd;
    opacity:1;
}

#clearBtn{
    width:24px;
    height:24px;
    flex-shrink:0;
    background:#ced4da;
    border:none;
    color:#fff;
    font-size:14px;
    font-weight:bold;
    border-radius:50%;
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
    margin-left:6px;
    transition:all 0.15s ease;
    opacity:0;
    pointer-events:none;
}

#clearBtn:hover {
    background:#adb5bd;
}

#sendBtn{
    width:36px;
    height:36px;
    flex-shrink:0;
    border:none;
    border-radius:50%;
    background:var(--primary);
    color:#fff;
    font-size:16px;
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
    transition:all 0.2s ease;
    box-shadow:0 2px 5px rgba(0,122,255,0.2);
}

#sendBtn:active {
    transform:scale(0.92);
    opacity:0.9;
}

.room-info-bar{
    display:flex;
    justify-content:space-between;
    align-items:flex-start;
    padding:6px 12px;
    border-top:1px solid #f6f6f6;
    background:#fcfcfc;
    gap:8px;
}

.info-item{
    background:#f1f1f1;
    padding:3px 8px;
    border-radius:5px;
    font-size:10px;
    font-weight:700;
    color:#666;
    white-space:nowrap;
}

#presenceList{
    display:flex;
    flex-wrap:wrap;
    gap:4px;
    flex:1;
    max-height:56px;
    overflow-y:auto;
    scrollbar-width:none;
}

#presenceList::-webkit-scrollbar{
    display:none;
}

.user-chip{
    background:var(--primary);
    color:#fff;
    padding:2px 8px;
    border-radius:10px;
    font-size:10px;
    white-space:nowrap;
    height:18px;
    display:inline-flex;
    align-items:center;
}

#chatWrap{
    flex:1;
    overflow-y:auto;
    padding:15px 12px;
    background:#f7f8fa;
    display:flex;
    flex-direction:column;
}

#list{
    display:flex;
    flex-direction:column-reverse;
    gap:12px;
}

.msg-wrap{
    display:flex;
    flex-direction:column;
}

.msg{
    background:#fff;
    border-radius:18px;
    padding:8px 14px;
    max-width:85%;
    box-shadow:0 1px 2px rgba(0,0,0,.05);
}

.msg-text{
    font-size:15px;
    line-height:1.5;
    white-space:pre-wrap;
    word-break:break-word;
}

.msg-text a{
    color:var(--primary);
}

.msg-meta{
    font-size:10px;
    color:#999;
    margin:4px 0 0 8px;
}

.sys-msg{
    align-self:center;
    color:#555;
    font-size:11px;
    font-weight:bold;
    margin:10px 0;
    background:#e9ecef;
    padding:4px 12px;
    border-radius:12px;
}

#footer{
    background:#fff;
    border-top:1px solid #ececec;
    padding:8px 10px calc(8px + env(safe-area-inset-bottom));
}

.footer-nav{
    display:grid;
    grid-template-columns:50px 44px 44px 1fr 70px;
    gap:8px;
    align-items:center;
}

.btn{
    border:none;
    border-radius:12px;
    display:flex;
    align-items:center;
    justify-content:center;
    font-weight:800;
    height:42px;
    cursor:pointer;
    font-size:11px;
}
</style>
</head>
<body>

<div id="lobby" style="display:flex;">
    <div class="lobby-content">

        <div style="text-align:center;">
            <h2 style="color:var(--primary);margin:0;font-size:24px;">NEZU ONETIME CHAT</h2>
            <p style="margin:4px 0 0 0;font-size:12px;font-weight:bold;color:#666;">
                安心の使い捨て・暗号化チャット
            </p>
        </div>

        <div class="info-box">
            <div style="margin-bottom:4px;">🔑 <strong>強力なエンドツーエンド暗号化</strong></div>
            <div style="font-size:12px;color:#666;margin-bottom:8px;padding-left:4px;">
                会話データはブラウザ側で完全に暗号化されてから送信されるため、サーバー管理者も一切解読できません。
            </div>
            <div>🗑️ <strong>データは即座に完全使い捨て</strong></div>
            <div style="font-size:12px;color:#666;padding-left:4px;">
                用件が済めば、サーバー内のチャットログや部屋の全データは即座に跡形もなく完全消滅します。
            </div>
        </div>

        <div id="errMsg" class="error-msg"></div>

        <input id="ni" class="lobby-input" maxlength="10" placeholder="表示名">
        <input id="tk" class="lobby-input" placeholder="本人確認キー">
        <div id="tp" style="font-size:11px;color:var(--accent);text-align:right;height:18px;font-weight:bold;"></div>

        <input id="ri" class="lobby-input" placeholder="部屋ID">
        <input id="pi" class="lobby-input" placeholder="暗号化パスワード">

        <button id="masterGenBtn" style="width:100%;height:40px;border:1px dashed var(--primary);background:#f0f7ff;border-radius:12px;color:var(--primary);font-weight:bold;">
            🎲 認証情報の自動生成
        </button>

        <button id="enterBtn" style="width:100%;height:60px;border:none;border-radius:20px;background:var(--primary);color:#fff;font-size:18px;font-weight:900;margin-top:8px;">
            認証して入室
        </button>

    </div>
</div>

<div id="mainApp">

<header id="header">

    <div class="app-header-top">
        <div class="input-container">
            <textarea id="mi" placeholder="メッセージを作成..." maxlength="500" rows="1"></textarea>
            <button id="clearBtn" type="button">✕</button>
        </div>
        <button id="sendBtn" type="button" title="送信">➔</button>
    </div>

    <div class="room-info-bar">
        <div id="roomDisplay" class="info-item"></div>
        <div id="presenceList"></div>
        <div id="presenceCount" style="font-size:10px;color:#999;font-weight:bold;padding-top:3px;"></div>
    </div>

</header>

<main id="chatWrap">
    <div id="list"></div>
</main>

<footer id="footer">

    <div class="footer-nav">
        <button id="focusBtn" class="btn" style="background:var(--primary);color:#fff;font-size:20px;">⌨️</button>
        <button id="toTopBtn" class="btn" style="background:#f0f2f5;">↑</button>
        <button id="toBottomBtn" class="btn" style="background:#f0f2f5;">↓</button>
        <button id="copyBtn" class="btn" style="background:var(--dark);color:#fff;">招待URL</button>
        <button id="exitBtn" class="btn" style="background:#fff0f0;color:var(--danger);">退出</button>
    </div>

</footer>

</div>

<script type="module">

import {
initializeApp
} from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";

import {
getDatabase,
ref,
push,
onValue,
set,
remove,
serverTimestamp,
query,
orderByChild,
get,
update,
onDisconnect
} from "https://www.gstatic.com/firebasejs/9.23.0/firebase-database.js";

const $ = id => document.getElementById(id);

const firebaseApp = initializeApp({
    apiKey:"AIzaSyApju_6KuGq8EkXQPI0aTOysFmZ22vL5HQ",
    databaseURL:"https://nezuochat-default-rtdb.asia-southeast1.firebasedatabase.app"
});
const db = getDatabase(firebaseApp);

let uid = localStorage.getItem("nez_uid");
if(!uid){
    uid = crypto.randomUUID();
    localStorage.setItem("nez_uid",uid);
}

let curR,curP,curN,curT,rawR;
let lastT = 0;
let userCount = 0;

const ROOM_LIFETIME = 30 * 60 * 1000; 

const showLobby = (msg = "") => {
    curR = null;
    if(msg) {
        $("errMsg").innerText = msg;
        $("errMsg").style.display = "block";
    }
    $("mainApp").style.display = "none";
    $("lobby").style.display = "flex";
    $("enterBtn").disabled = false;
    $("enterBtn").innerText = "認証して入室";
};

const scrollUp = () => {
    const wrap = $("chatWrap");
    if(wrap) {
        wrap.scrollTo({
            top: 0,
            behavior: "smooth"
        });
    }
};

const hash = t => CryptoJS.SHA256(t).toString();
const enc = (t,k) => CryptoJS.AES.encrypt(t,k).toString();
const dec = (c,k) => {
    try{
        if(!c) return null;
        const bytes = CryptoJS.AES.decrypt(c,k);
        return bytes.toString(CryptoJS.enc.Utf8)||null;
    }catch{
        return null;
    }
};

const esc = t =>
(t||"").replace(/[&<>"']/g,c=>({
"&":"&amp;",
"<":"&lt;",
">":"&gt;",
'"':"&quot;",
"'":"&#39;"
}[c]));

const linkify = t => {
    const escaped = esc(t);
    return escaped.replace(
        /(https?:\/\/[^\s]+)/g,
        '<a href="$1" target="_blank">$1</a>'
    );
};

const toggleClearBtn = (text) => {
    const btn = $("clearBtn");
    if(text && text.trim().length > 0) {
        btn.style.opacity = "1";
        btn.style.pointerEvents = "auto";
    } else {
        btn.style.opacity = "0";
        btn.style.pointerEvents = "none";
    }
};

async function join(rID,pass,name,trip){
    rawR = rID;
    curR = hash(rID);
    curP = pass;
    curN = name;
    curT = trip;

    const chatRef = ref(db,`chat/${curR}`);
    const presRef = ref(db,`presence/${curR}`);
    const roomRef = ref(db,`rooms/${curR}`);
    const myRef = ref(db,`presence/${curR}/${uid}`);

    let isReEntry = false;

    try {
        const snap = await get(presRef);
        if(snap.exists()){
            const users = snap.val() || {};
            
            // 🛠️ 同一UIDが存在する場合の厳格チェック
            if(users[uid]){
                const oldN = dec(users[uid].nEnc, pass);
                const oldT = dec(users[uid].tEnc, pass) || "";
                
                // 名前とトリップの両方が完全に一致している場合のみ「正常な復帰」とみなす
                if(oldN && oldN === name && oldT === trip){
                    isReEntry = true;
                } else {
                    // 一致しない場合はなりすまし・書き換え防止のため弾く
                    showLobby("以前の接続情報（名前・本人確認キー）と一致しません");
                    return;
                }
            }

            // 他のユーザー（異なるUID）との重複チェック
            for(const k in users){
                if(k === uid) continue;
                const n = dec(users[k].nEnc, pass);
                const t = dec(users[k].tEnc, pass) || "";

                if(n && n === name){
                    showLobby("その名前は既に使用されています");
                    return;
                }
                if(t && t === trip){
                    showLobby("そのキーは既に使用されています");
                    return;
                }
            }
        }
    } catch(e) {
        console.error(e);
        showLobby("認証エラーが発生しました。接続を確認してください。");
        return;
    }

    $("roomDisplay").innerText = rID;
    $("lobby").style.display = "none";
    $("mainApp").style.display = "flex";

    try {
        await set(myRef,{
            nEnc:enc(name,pass),
            tEnc:enc(trip,pass),
            lastSeen:serverTimestamp()
        });

        // 同一UID・同一情報での再入室時はお知らせを出さない
        if (!isReEntry) {
            await push(chatRef,{
                type:"sys",
                text:enc(`${name}${trip}さんが入室しました`,pass),
                time:serverTimestamp()
            });
        }
    } catch(e) {
        console.error(e);
        showLobby("サーバーへの書き込みに失敗しました（認証不一致）");
        return;
    }

    onDisconnect(myRef).remove();

    onValue(presRef, async s=>{
        if(!curR) return;
        const users = s.val() || {};
        const list = $("presenceList");
        list.innerHTML = "";
        let count = 0;

        Object.keys(users).forEach(k=>{
            const n = dec(users[k].nEnc,curP);
            const t = dec(users[k].tEnc,curP)||"";
            if(!n) return;
            count++;

            const span = document.createElement("span");
            span.className = "user-chip";
            span.innerText = n + t;
            list.appendChild(span);
        });

        userCount = count;
        $("presenceCount").innerText = `(${count}名)`;

        if (count === 0) {
            try {
                await remove(chatRef);
                await remove(presRef);
                await remove(roomRef);
            } catch(e) {
                console.error("即時データ削除失敗:", e);
            }
        }
    });

    onValue(query(chatRef,orderByChild("time")),s=>{
        $("list").innerHTML = "";
        s.forEach(c=>{
            const m = c.val();
            const txt = dec(m.text,curP);
            if(!txt) return;

            const div = document.createElement("div");
            div.className = "msg-wrap";

            const msgTime = m.time ? new Date(m.time) : new Date();
            const time = msgTime.toLocaleTimeString([],{
                hour:"2-digit",
                minute:"2-digit",
                second:"2-digit"
            });

            if(m.type === "sys"){
                div.innerHTML = `<div class="sys-msg">${linkify(txt)}</div>`;
            }else{
                const senderName = dec(m.nEnc,curP) || "???";
                const senderTrip = dec(m.tEnc,curP) || "";
                div.innerHTML =
                `
                <div style="margin-left:8px;font-size:10px;font-weight:bold;">
                    ${esc(senderName)}${esc(senderTrip)}
                </div>
                <div class="msg">
                    <div class="msg-text">${linkify(txt)}</div>
                </div>
                <div class="msg-meta">${time}</div>
                `;
            }
            $("list").appendChild(div);
        });
    });

    const updater = async()=>{
        if(!curR) return;
        
        try {
            await update(myRef,{ lastSeen:serverTimestamp() });

            const roomSnap = await get(roomRef);
            if(roomSnap.exists()){
                const rData = roomSnap.val();
                if(rData.deleteAt && Date.now() > rData.deleteAt){
                    await remove(chatRef);
                    await remove(presRef);
                    await remove(roomRef);
                    alert("部屋が自動消滅しました。");
                    location.reload();
                    return;
                }
            }
        } catch(e) {
            console.error("定期生存確認失敗:", e);
        }
    };

    updater();
    setInterval(updater,60000);
}

const sendMsg = async()=>{
    const v = $("mi").value.trim();
    if(!v) return;
    if(Date.now() - lastT < 300) return;
    lastT = Date.now();

    try {
        await push(ref(db,`chat/${curR}`),{
            nEnc:enc(curN,curP),
            tEnc:enc(curT,curP),
            text:enc(v,curP),
            time:serverTimestamp()
        });

        await set(ref(db,`rooms/${curR}`),{ 
            deleteAt: Date.now() + ROOM_LIFETIME 
        });
    } catch(e) {
        console.error(e);
    }

    $("mi").value = "";
    $("mi").style.height = "24px"; 
    toggleClearBtn(""); 
    scrollUp();
};

$("sendBtn").onclick = sendMsg;

$("mi").onkeydown = e=>{
    if(e.key === "Enter" && !e.shiftKey && !e.isComposing){
        e.preventDefault();
        sendMsg();
    }
};

$("mi").oninput = e => {
    const el = e.target;
    el.style.height = "24px"; 
    const nextHeight = el.scrollHeight - 4; 
    el.style.height = Math.min(Math.max(nextHeight, 24), 96) + "px";
    toggleClearBtn(el.value);
};

$("focusBtn").onclick = ()=>{
    $("mi").focus();
    scrollUp();
};

$("clearBtn").onclick = ()=>{
    $("mi").value = "";
    $("mi").style.height = "24px";
    toggleClearBtn("");
    $("mi").focus(); 
};

$("exitBtn").onclick = async()=>{
    if(!confirm("退出しますか？")) return;

    const rTmp = curR;
    const pTmp = curP;
    const nTmp = curN;
    const tTmp = curT;
    
    showLobby();

    onDisconnect(ref(db,`presence/${rTmp}/${uid}`)).cancel();

    try {
        await remove(ref(db,`presence/${rTmp}/${uid}`));
        
        const pSnap = await get(ref(db,`presence/${rTmp}`));
        if (pSnap.exists() && Object.keys(pSnap.val()).length > 0) {
            await push(ref(db,`chat/${rTmp}`),{
                type:"sys",
                text:enc(`${nTmp}${tTmp}さんが退出しました`,pTmp),
                time:serverTimestamp()
            });
        }
    } catch(e) {
        console.error(e);
    }

    location.reload();
};

$("enterBtn").onclick = ()=>{
    $("errMsg").style.display = "none";

    const r = $("ri").value.trim();
    const p = $("pi").value.trim();
    const n = $("ni").value.trim();
    const tk = $("tk").value.trim();
    const tp = $("tp").innerText;

    if(!n){ $("errMsg").innerText = "名前を入力してください"; $("errMsg").style.display = "block"; return; }
    if(!tk){ $("errMsg").innerText = "本人確認キーを入力してください"; $("errMsg").style.display = "block"; return; }
    if(!r || !p){ $("errMsg").innerText = "部屋IDとパスワードを入力してください"; $("errMsg").style.display = "block"; return; }

    $("enterBtn").disabled = true;
    $("enterBtn").innerText = "接続中...";

    localStorage.setItem("nez_n",n);
    localStorage.setItem("nez_t",tk);

    join(r,p,n,tp);
};

let isInitialConnect = true;
onValue(ref(db, ".info/connected"), (snap) => {
    if (isInitialConnect) {
        isInitialConnect = false;
        return;
    }
    if (snap.val() === false && curR) {
        console.warn("Firebase切断を検知しました。ロビーに戻ります。");
        showLobby("サーバーとの接続が切断されました。再試行してください。");
    }
});

$("copyBtn").onclick = async()=>{
    const url = `${location.origin}${location.pathname}?r=${encodeURIComponent(rawR)}&p=${encodeURIComponent(curP)}`;
    try{
        await navigator.clipboard.writeText(url);
        alert("コピーしました");
    }catch{
        alert(url);
    }
};

$("toTopBtn").onclick = scrollUp;

$("toBottomBtn").onclick = ()=>{
    const wrap = $("chatWrap");
    if(wrap) {
        wrap.scrollTo({
            top: wrap.scrollHeight,
            behavior: "smooth"
        });
    }
};

$("masterGenBtn").onclick = ()=>{
    $("ri").value = Math.random().toString(36).slice(2,10);
    $("pi").value = Math.random().toString(36).slice(2,12);
};

$("tk").oninput = async e=>{
    const v = e.target.value.trim();
    if(!v){
        $("tp").innerText = "";
        return;
    }

    const b = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(v));
    $("tp").innerText = "◆" + Array.from(new Uint8Array(b)).map(x=>x.toString(16).padStart(2,"0")).join("").slice(0,6);
};

window.onload = ()=>{
    const sN = localStorage.getItem("nez_n");
    const sT = localStorage.getItem("nez_t");

    if(sN) $("ni").value = sN;
    if(sT){
        $("tk").value = sT;
        $("tk").dispatchEvent(new Event("input"));
    }

    const u = new URLSearchParams(location.search);
    if(u.get("r")) $("ri").value = u.get("r");
    if(u.get("p")) $("pi").value = u.get("p");
};

</script>
