<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>NEZUO CHAT KING MODE</title>

<style>

html,body{
  margin:0;
  height:100%;
  overflow:hidden;
  background:linear-gradient(135deg,#d7dde5,#b8c2cf);
  font-family:-apple-system,BlinkMacSystemFont,sans-serif;
}

/* HEADER */
#header{
  position:fixed;
  top:0;
  left:0;
  right:0;
  z-index:9000;
  padding:calc(env(safe-area-inset-top) + 10px) 10px 10px;
  display:flex;
  gap:8px;
  background:rgba(255,255,255,.14);
  border-bottom:1px solid rgba(255,255,255,.25);
  backdrop-filter:blur(14px);
}

#msgInput{
  flex:1;
  height:42px;
  border:none;
  outline:none;
  border-radius:12px;
  padding:0 12px;
  background:rgba(255,255,255,.64);
  font-size:15px;
}

button{
  border:none;
  border-radius:12px;
  color:#fff;
  font-weight:700;
  cursor:pointer;
}

#sendBtn{
  width:70px;
  height:42px;
  background:rgba(40,48,58,.84);
  font-size:14px;
}

/* CHAT */
#chatWrap{
  position:fixed;
  top:68px;
  bottom:84px;
  left:0;
  right:0;
  overflow-y:auto;
  padding:14px;
  display:flex;
  flex-direction:column;
  gap:10px;
}

.msg{
  max-width:78%;
  padding:10px 12px;
  border-radius:18px;
  word-break:break-word;
  position:relative;
  box-shadow:0 4px 18px rgba(0,0,0,.08);
}

.me{
  align-self:flex-end;
  background:rgba(40,48,58,.78);
  color:#fff;
}

.other{
  align-self:flex-start;
  background:rgba(255,255,255,.62);
  color:#111;
}

/* =========================
   ★ 名前反転UI（ここ重要）
========================= */

.msg b{
  display:flex;
  gap:6px;
  margin-bottom:4px;
  font-size:13px;
  font-weight:700;
}

/* 自分：黒→白反転 */
.mine-name{
  background:#000 !important;
  color:#fff !important;
  padding:2px 8px;
  border-radius:8px;
}

/* 相手：白→黒反転 */
.other-name{
  background:#fff !important;
  color:#000 !important;
  padding:2px 8px;
  border-radius:8px;
  border:1px solid #000;
}

/* 管理者 */
.msg b.admin{
  color:#000;
  background:#fff;
  padding:2px 6px;
  border-radius:8px;
  font-weight:900;
}

/* 削除ボタン */
.delBtn{
  position:absolute;
  top:6px;
  right:6px;
  width:26px;
  height:26px;
  border-radius:999px;
  background:rgba(255,0,0,.15);
  color:#ff4d4d;
  font-size:14px;
}

/* FOOTER */
#footer{
  position:fixed;
  left:0;
  right:0;
  bottom:0;
  padding:calc(env(safe-area-inset-bottom) + 10px) 10px 10px;
  display:grid;
  grid-template-columns:44px 44px 1fr auto;
  gap:12px;
  background:rgba(255,255,255,.14);
  border-top:1px solid rgba(255,255,255,.25);
  backdrop-filter:blur(14px);
  align-items:center;
}

#upBtn,#downBtn{
  height:44px;
  width:44px;
  border-radius:14px;
  background:rgba(40,48,58,.78);
}

#nameBtn{
  height:44px;
  border-radius:14px;
  background:rgba(40,48,58,.78);
  font-size:13px;
  padding:0 10px;
}

</style>
</head>

<body>

<div id="header">
  <input id="msgInput" placeholder="メッセージ" />
  <button id="sendBtn">送信</button>
</div>

<div id="chatWrap"></div>

<div id="footer">
  <button id="upBtn">↑</button>
  <button id="downBtn">↓</button>
  <div></div>
  <button id="nameBtn">名前</button>
</div>

<script type="module">

let started = false;
window.addEventListener("load", startChat);

async function startChat(){

  if(started) return;
  started = true;

  const { initializeApp } =
  await import("https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js");

  const {
    getDatabase,
    ref,
    push,
    onChildAdded,
    query,
    limitToLast,
    remove
  } = await import("https://www.gstatic.com/firebasejs/9.23.0/firebase-database.js");

  const app = initializeApp({
    apiKey:"AIzaSyApju_6KuGq8EkXQPI0aTOysFmZ22vL5HQ",
    authDomain:"nezubo2.firebaseapp.com",
    databaseURL:"https://nezubo2-default-rtdb.firebaseio.com",
    projectId:"nezubo2"
  });

  const db = getDatabase(app);
  const chatRef = query(ref(db,"chat"), limitToLast(80));

  let uid = localStorage.getItem("uid");
  if(!uid){
    uid = crypto.randomUUID();
    localStorage.setItem("uid",uid);
  }

  let userName = localStorage.getItem("userName") || "名無し";

  const ADMIN_UIDS = ["eobk3m5b"];

  function isAdmin(u){
    return ADMIN_UIDS.includes(u);
  }

  const chatWrap = document.getElementById("chatWrap");
  const msgInput = document.getElementById("msgInput");
  const sendBtn = document.getElementById("sendBtn");
  const nameBtn = document.getElementById("nameBtn");

  function makeShortCode(uid){
    let h=0;
    for(let i=0;i<uid.length;i++){
      h=(h*31+uid.charCodeAt(i))>>>0;
    }
    return h.toString(36).toUpperCase().slice(0,4);
  }

  function updateName(){
    nameBtn.textContent = `${userName} #${makeShortCode(uid)}`;
  }

  updateName();

  async function send(){
    const t = msgInput.value.trim();
    if(!t) return;

    await push(ref(db,"chat"),{
      uid,
      name:userName,
      text:t,
      time:Date.now()
    });

    msgInput.value="";
  }

  function renderText(text){
    return text.replace(/(https?:\/\/[^\s]+)/g,
      url=>`<a href="${url}" target="_blank">${url}</a>`
    );
  }

  function createMsg(d,id){

    const div = document.createElement("div");
    const mine = d.uid === uid;

    div.className = mine ? "msg me" : "msg other";

    const nameClass =
      isAdmin(d.uid) ? "admin"
      : mine ? "mine-name"
      : "other-name";

    div.innerHTML = `
      <b class="${nameClass}">
        ${isAdmin(d.uid) ? "👑 " : ""}
        ${d.name} #${makeShortCode(d.uid)}
      </b>
      <div>${renderText(d.text)}</div>
    `;

    if(isAdmin(uid) || uid === d.uid){
      const del = document.createElement("button");
      del.className="delBtn";
      del.textContent="×";

      del.onclick=async()=>{
        if(!confirm("削除？"))return;
        await remove(ref(db,"chat/"+id));
        div.remove();
      };

      div.appendChild(del);
    }

    chatWrap.prepend(div);
  }

  onChildAdded(chatRef,(snap)=>{
    createMsg(snap.val(),snap.key);
  });

  sendBtn.onclick=send;

  msgInput.onkeydown=(e)=>{
    if(e.key==="Enter"){
      send();
    }
  };

}

</script>

</body>
</html>
