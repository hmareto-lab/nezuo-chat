<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>NEZUO CHAT THREAD MODE</title>

<style>
html,body{
  margin:0;
  height:100%;
  overflow:hidden;
  background:linear-gradient(135deg,#d7dde5,#b8c2cf);
  font-family:-apple-system,BlinkMacSystemFont,sans-serif;
}

/* HEADER */
#header{
  position:fixed;
  top:0;
  left:0;
  right:0;
  z-index:9000;
  padding:calc(env(safe-area-inset-top) + 10px) 10px 10px;
  display:flex;
  flex-direction:column;
  gap:6px;
  background:rgba(255,255,255,.14);
  border-bottom:1px solid rgba(255,255,255,.25);
  backdrop-filter:blur(14px);
}

/* REPLY BAR */
#replyBar{
  display:none;
  font-size:12px;
  padding:6px 10px;
  border-radius:10px;
  background:rgba(0,0,0,.25);
  color:#fff;
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:10px;
}

/* 🔴 返信キャンセル */
#cancelReply{
  background:rgba(255,0,0,.75);
  color:#fff;
  border:none;
  border-radius:8px;
  padding:2px 8px;
  font-size:12px;
  cursor:pointer;
}

#msgInputWrap{display:flex;gap:8px;}

#msgInput{
  flex:1;
  height:42px;
  border:none;
  outline:none;
  border-radius:12px;
  padding:0 12px;
  background:rgba(255,255,255,.64);
  font-size:15px;
}

button{
  border:none;
  border-radius:12px;
  color:#fff;
  font-weight:700;
  cursor:pointer;
}

#sendBtn{
  width:70px;
  height:42px;
  background:rgba(40,48,58,.84);
}

/* CHAT */
#chatWrap{
  position:fixed;
  top:100px;
  bottom:84px;
  left:0;
  right:0;
  overflow-y:auto;
  padding:14px;
  display:flex;
  flex-direction:column;
  gap:14px;
}

/* THREAD */
.thread{display:flex;flex-direction:column;gap:6px;}

.threadHeader{
  display:flex;
  align-items:center;
  gap:8px;
}

.collapseBtn{
  width:24px;height:24px;
  border-radius:6px;
  background:rgba(0,0,0,.25);
  color:#fff;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:12px;
}

/* MSG */
.msg{
  max-width:78%;
  padding:10px 12px;
  border-radius:18px;
  word-break:break-word;
  position:relative;
  box-shadow:0 4px 18px rgba(0,0,0,.08);
}

.me{align-self:flex-end;background:rgba(40,48,58,.78);color:#fff;}
.other{align-self:flex-start;background:rgba(255,255,255,.62);color:#111;}

/* CHILD */
.replyChild{
  margin-left:30px;
  max-width:72%;
  padding:8px 10px;
  border-radius:14px;
  font-size:13px;
}

/* NAME */
.mine-name{background:#000;color:#fff;padding:2px 8px;border-radius:8px;font-size:13px;}
.other-name{background:#fff;color:#000;padding:2px 8px;border-radius:8px;border:1px solid #000;font-size:13px;}

/* ACTION */
.delBtn,.replyBtn{
  position:absolute;
  width:22px;height:22px;
  border-radius:6px;
  color:#fff;
  font-size:12px;
  font-weight:900;
  display:flex;
  align-items:center;
  justify-content:center;
}

.delBtn{top:6px;right:6px;background:rgba(255,0,0,0.45);}
.replyBtn{bottom:6px;right:32px;background:rgba(0,120,255,0.45);}

/* MEDIA */
.msg img{
  max-width:100%;
  border-radius:12px;
  margin-top:6px;
  cursor:pointer;
}

.ytThumb{
  position:relative;
  margin-top:6px;
  cursor:pointer;
}

.ytThumb img{
  width:100%;
  border-radius:12px;
}

/* MODAL */
#modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.8);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:9999;
}

#modal img{
  max-width:90%;
  max-height:90%;
  border-radius:10px;
}

/* FOOTER */
#footer{
  position:fixed;
  left:0;right:0;bottom:0;
  padding:calc(env(safe-area-inset-bottom) + 10px) 10px 10px;
  display:grid;
  grid-template-columns:44px 44px 1fr auto;
  gap:12px;
  background:rgba(255,255,255,.14);
  border-top:1px solid rgba(255,255,255,.25);
  backdrop-filter:blur(14px);
}

#upBtn,#downBtn,#nameBtn{
  height:44px;
  border-radius:14px;
  background:rgba(40,48,58,.78);
}
</style>
</head>

<body>

<div id="header">
  <div id="replyBar"></div>
  <div id="msgInputWrap">
    <input id="msgInput" placeholder="メッセージ" />
    <button id="sendBtn">送信</button>
  </div>
</div>

<div id="chatWrap"></div>

<div id="footer">
  <button id="upBtn">↑</button>
  <button id="downBtn">↓</button>
  <div></div>
  <button id="nameBtn"></button>
</div>

<div id="modal" onclick="this.style.display='none'">
  <img id="modalImg" />
</div>

<script type="module">

let started=false;
window.addEventListener("load",startChat);

window.openImg=(url)=>{
  document.getElementById("modalImg").src=url;
  document.getElementById("modal").style.display="flex";
};

function renderContent(text){
  return text.replace(/(https?:\/\/[^\s]+)/g,url=>{
    if(url.match(/\.(jpg|jpeg|png|gif|webp)$/i)){
      return `<img src="${url}" onclick="openImg('${url}')">`;
    }

    let yt=url.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/)([\w-]+)/);
    if(yt){
      const id=yt[1];
      const thumb=`https://img.youtube.com/vi/${id}/hqdefault.jpg`;
      return `<div class="ytThumb" onclick="window.open('${url}','_blank')">
        <img src="${thumb}">
      </div>`;
    }

    return `<a href="${url}" target="_blank" style="color:#06c;">${url}</a>`;
  });
}

async function startChat(){
if(started)return;
started=true;

const { initializeApp } =
await import("https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js");

const { getDatabase, ref, push, onChildAdded, remove, query, limitToLast }
= await import("https://www.gstatic.com/firebasejs/9.23.0/firebase-database.js");

const app = initializeApp({
  apiKey:"AIzaSyApju_6KuGq8EkXQPI0aTOysFmZ22vL5HQ",
  authDomain:"nezubo2.firebaseapp.com",
  databaseURL:"https://nezubo2-default-rtdb.firebaseio.com",
  projectId:"nezubo2"
});

const db=getDatabase(app);
const chatRef=query(ref(db,"chat"),limitToLast(80));

const ADMIN_UIDS=["eobk3m5b","6ee437db-57db-43f2-8bfd-40193e9d5b3c"];

let uid=localStorage.getItem("uid")||crypto.randomUUID();
localStorage.setItem("uid",uid);

let userName=localStorage.getItem("userName")||"名無し";

function makeCode(uid){
  let h=0;
  for(let i=0;i<uid.length;i++)h=(h*31+uid.charCodeAt(i))>>>0;
  return "#"+h.toString(16).slice(0,4).toUpperCase();
}

let myCode=makeCode(uid);

const chatWrap=document.getElementById("chatWrap");
const msgInput=document.getElementById("msgInput");
const sendBtn=document.getElementById("sendBtn");
const nameBtn=document.getElementById("nameBtn");
const replyBar=document.getElementById("replyBar");

let replyingTo=null;

const messages=new Map();
const threads=new Map();
const collapsedMap=new Map();

function updateName(){
  nameBtn.textContent=(ADMIN_UIDS.includes(uid)?"👑 ":"")+userName+" "+myCode;
}
updateName();

/* 🔴 返信キャンセル */
function cancelReply(){
  replyingTo=null;
  replyBar.style.display="none";
}

function showReply(name,id){
  replyingTo=id;
  replyBar.style.display="flex";
  replyBar.innerHTML=`
    <span>返信: ${name}</span>
    <button id="cancelReply">キャンセル</button>
  `;
  document.getElementById("cancelReply").onclick=cancelReply;
}

window.startReply=(id)=>{
  const msg=messages.get(id);
  if(msg)showReply(msg.name,id);
};

/* 🔥 削除修正 */
window.deleteMsg=async(id,uidMsg)=>{
  try{
    if(!ADMIN_UIDS.includes(uid)&&uid!==uidMsg){
      alert("権限がありません");
      return;
    }

    const ok=confirm("このメッセージを削除しますか？");
    if(!ok)return;

    await remove(ref(db,"chat/"+id));

  }catch(e){
    alert("削除失敗: "+e.message);
  }
};

function createMsg(d){
  const mine=d.uid===uid;
  const div=document.createElement("div");
  div.className="msg "+(mine?"me":"other");

  const crown = ADMIN_UIDS.includes(d.uid)?"👑 ":"";

  div.innerHTML=`
    <b class="${mine?'mine-name':'other-name'}">${crown}${d.name} ${makeCode(d.uid)}</b>
    <div>${renderContent(d.text)}</div>
  `;

  const r=document.createElement("div");
  r.className="replyBtn";r.textContent="↩";
  r.onclick=()=>window.startReply(d.id);
  div.appendChild(r);

  const del=document.createElement("div");
  del.className="delBtn";del.textContent="✖";
  del.onclick=()=>window.deleteMsg(d.id,d.uid);
  div.appendChild(del);

  return div;
}

function createChild(d){
  const div=document.createElement("div");
  div.className="replyChild";
  div.innerHTML=renderContent(d.name+": "+d.text);
  return div;
}

function render(){
  chatWrap.innerHTML="";
  for(const [rootId,list] of threads.entries()){
    const root=list.find(m=>m.id===rootId);
    if(!root)continue;

    const thread=document.createElement("div");
    const header=document.createElement("div");
    header.className="threadHeader";

    const btn=document.createElement("div");
    btn.className="collapseBtn";

    const collapsed=collapsedMap.get(rootId)??true;
    btn.textContent=collapsed?"▶":"▼";

    btn.onclick=()=>{
      collapsedMap.set(rootId,!collapsed);
      render();
    };

    header.appendChild(btn);
    header.appendChild(createMsg(root));
    thread.appendChild(header);

    if(!collapsed){
      list.filter(m=>m.id!==rootId).forEach(c=>{
        thread.appendChild(createChild(c));
      });
    }

    chatWrap.prepend(thread);
  }
}

/* FIREBASE */
onChildAdded(chatRef,snap=>{
  const d=snap.val();
  const id=snap.key;
  d.id=id;

  messages.set(id,d);
  const root=d.replyTo||id;

  if(!threads.has(root))threads.set(root,[]);
  threads.get(root).push(d);

  render();
});

/* SEND */
async function send(){
  const t=msgInput.value.trim();
  if(!t)return;

  await push(ref(db,"chat"),{
    uid,name:userName,text:t,time:Date.now(),replyTo:replyingTo
  });

  msgInput.value="";
  cancelReply();
}

sendBtn.onclick=send;
msgInput.onkeydown=e=>e.key==="Enter"&&send();

}
</script>

</body>
</html>
