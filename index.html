<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>NEZUO CHAT KING MODE</title>

<style>

html,body{
  margin:0;
  height:100%;
  overflow:hidden;
  background:linear-gradient(135deg,#d7dde5,#b8c2cf);
  font-family:-apple-system,BlinkMacSystemFont,sans-serif;
}

/* APP */
#app{
  width:100%;
  height:100%;
}

/* HEADER */
#header{
  position:fixed;
  top:0;
  left:0;
  right:0;
  z-index:9000;
  padding:calc(env(safe-area-inset-top) + 10px) 10px 10px;
  display:flex;
  gap:8px;
  background:rgba(255,255,255,.14);
  border-bottom:1px solid rgba(255,255,255,.25);
  backdrop-filter:blur(14px);
}

#msgInput{
  flex:1;
  height:42px;
  border:none;
  outline:none;
  border-radius:12px;
  padding:0 12px;
  background:rgba(255,255,255,.64);
  font-size:15px;
}

button{
  border:none;
  border-radius:12px;
  color:#fff;
  font-weight:700;
  cursor:pointer;
}

#sendBtn{
  width:70px;
  background:rgba(40,48,58,.84);
}

/* CHAT */
#chatWrap{
  position:fixed;
  top:68px;
  bottom:74px;
  left:0;
  right:0;
  overflow-y:auto;
  padding:14px;
  display:flex;
  flex-direction:column;
  gap:10px;
}

.msg{
  max-width:78%;
  padding:10px 12px;
  border-radius:18px;
  word-break:break-word;
  position:relative;
  box-shadow:0 4px 18px rgba(0,0,0,.08);
}

.me{
  align-self:flex-end;
  background:rgba(40,48,58,.78);
  color:#fff;
}

.other{
  align-self:flex-start;
  background:rgba(255,255,255,.62);
  color:#111;
}

.msg b{
  display:flex;
  gap:6px;
  margin-bottom:4px;
  font-size:12px;
}

/* TAG */
.tag{
  padding:2px 7px;
  border-radius:999px;
  font-size:10px;
  background:rgba(0,0,0,.08);
}

/* DELETE */
.delBtn{
  position:absolute;
  top:6px;
  right:6px;
  width:26px;
  height:26px;
  border-radius:999px;
  background:rgba(255,0,0,.15);
  color:#ff4d4d;
  font-size:14px;
}

/* MEDIA */
.msg img{
  max-width:100%;
  border-radius:12px;
  margin-top:6px;
}

.msg iframe{
  width:100%;
  height:180px;
  border-radius:12px;
  margin-top:6px;
}

/* FOOTER */
#footer{
  position:fixed;
  left:0;
  right:0;
  bottom:0;
  padding:10px 10px calc(10px + env(safe-area-inset-bottom));
  display:grid;
  grid-template-columns:70px 70px 1fr auto;
  gap:8px;
  background:rgba(255,255,255,.14);
  border-top:1px solid rgba(255,255,255,.25);
  backdrop-filter:blur(14px);
}

#upBtn,#downBtn,#nameBtn{
  background:rgba(40,48,58,.78);
}

a{
  color:#3b82f6;
}

</style>
</head>

<body>

<div id="app">

  <div id="header">
    <input id="msgInput" placeholder="メッセージ" />
    <button id="sendBtn">送信</button>
  </div>

  <div id="chatWrap"></div>

  <div id="footer">
    <button id="upBtn">↑</button>
    <button id="downBtn">↓</button>
    <div></div>
    <button id="nameBtn">名前</button>
  </div>

</div>

<script type="module">

let started = false;
window.addEventListener("load", startChat);

async function startChat(){

  if(started) return;
  started = true;

  const { initializeApp } =
  await import("https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js");

  const {
    getDatabase,
    ref,
    push,
    onChildAdded,
    query,
    limitToLast,
    remove
  } = await import("https://www.gstatic.com/firebasejs/9.23.0/firebase-database.js");

  const app = initializeApp({
    apiKey:"AIzaSyApju_6KuGq8EkXQPI0aTOysFmZ22vL5HQ",
    authDomain:"nezubo2.firebaseapp.com",
    databaseURL:"https://nezubo2-default-rtdb.firebaseio.com",
    projectId:"nezubo2"
  });

  const db = getDatabase(app);
  const chatRef = query(ref(db,"chat"), limitToLast(80));

  let uid = localStorage.getItem("uid");
  if(!uid){
    uid = crypto.randomUUID();
    localStorage.setItem("uid",uid);
  }

  let userName = localStorage.getItem("userName") || "名無し";

  const ADMIN_UID = "eobk3m5b";

  const chatWrap = document.getElementById("chatWrap");
  const msgInput = document.getElementById("msgInput");
  const sendBtn = document.getElementById("sendBtn");
  const nameBtn = document.getElementById("nameBtn");
  const upBtn = document.getElementById("upBtn");
  const downBtn = document.getElementById("downBtn");

  function isAdmin(u){
    return u === ADMIN_UID;
  }

  nameBtn.textContent =
  (isAdmin(uid) ? "👑 " : "") + userName;

  function changeName(){
    const n = prompt("名前変更");
    if(!n) return;

    userName = n.trim();
    localStorage.setItem("userName",userName);

    nameBtn.textContent =
    (isAdmin(uid) ? "👑 " : "") + userName;
  }

  async function send(){
    const t = msgInput.value.trim();
    if(!t) return;

    await push(ref(db,"chat"),{
      uid,
      name:userName,
      text:t,
      time:Date.now()
    });

    msgInput.value = "";
  }

  function canDelete(messageUid){
    return isAdmin(uid) || uid === messageUid;
  }

  /* =========================
     ★ メディア変換関数
  ========================= */
  function renderText(text){

    // YouTube
    const yt = text.match(/(?:https?:\/\/)?(?:www\.)?(?:youtube\.com\/watch\?v=|youtu\.be\/)([a-zA-Z0-9_-]+)/);
    if(yt){
      const id = yt[1];
      return `
        <iframe src="https://www.youtube.com/embed/${id}"
        frameborder="0" allowfullscreen></iframe>
      `;
    }

    // 画像
    const img = text.match(/(https?:\/\/.*\.(jpg|jpeg|png|gif|webp))/i);
    if(img){
      return `<img src="${img[1]}">`;
    }

    // 通常リンク
    const urlRegex = /(https?:\/\/[^\s]+)/g;
    return text.replace(urlRegex,(url)=>{
      return `<a href="${url}" target="_blank">${url}</a>`;
    });
  }

  function createMsg(d,id){

    const div = document.createElement("div");
    const mine = d.uid === uid;

    div.className = mine ? "msg me" : "msg other";

    div.innerHTML = `
      <b>
        ${d.uid === ADMIN_UID ? "👑 " : ""}
        ${d.name}
      </b>
      <div>${renderText(d.text)}</div>
    `;

    if(canDelete(d.uid)){

      const del = document.createElement("button");
      del.className = "delBtn";
      del.textContent = "×";

      del.onclick = async ()=>{
        if(!confirm("削除する？")) return;
        await remove(ref(db,"chat/" + id));
        div.remove();
      };

      div.appendChild(del);
    }

    chatWrap.prepend(div);
  }

  onChildAdded(chatRef,(snap)=>{
    createMsg(snap.val(), snap.key);
  });

  upBtn.onclick = ()=> chatWrap.scrollTo({top:0,behavior:"smooth"});
  downBtn.onclick = ()=> chatWrap.scrollTo({top:chatWrap.scrollHeight,behavior:"smooth"});

  sendBtn.onclick = send;
  nameBtn.onclick = changeName;

  msgInput.onkeydown = (e)=>{
    if(e.key==="Enter"){
      e.preventDefault();
      send();
    }
  };

}

</script>

</body>
</html>
