<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>NEZUO CHAT</title>

<style>
html,body{
  margin:0;
  height:100%;
  font-family:sans-serif;
  background:#e5e5e5;
  overflow:hidden;
}
body{display:flex;flex-direction:column;}

/* HEADER */
#header{
  height:48px;
  background:#111;
  color:#fff;
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:bold;
  position:relative;
}

#header .btns{
  position:absolute;
  right:10px;
  display:flex;
  gap:6px;
}

button{
  height:32px;
  border:none;
  border-radius:6px;
  background:#444;
  color:#fff;
  font-size:11px;
  cursor:pointer;
}

/* LOGIN / BAR */
#login,#bar{
  height:56px;
  background:#1f1f1f;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:6px;
}

#login input,#bar input{
  width:180px;
  height:36px;
  border:none;
  border-radius:8px;
  padding:0 8px;
  background:#2b2b2b;
  color:#fff;
}

/* CHAT */
#chat{
  flex:1;
  overflow-y:auto;
  display:flex;
  flex-direction:column;
  padding:10px;
}

.msg{
  max-width:70%;
  margin:6px;
  padding:8px 12px;
  border-radius:16px;
  background:#fff;
  border:1px solid #ddd;
  word-break:break-word;
}

.me{
  align-self:flex-end;
  background:#222;
  color:#fff;
}

/* DELETE */
.delBtn{
  margin-left:8px;
  border:none;
  background:transparent;
  color:rgba(255,0,0,0.6);
  cursor:pointer;
}

/* PALETTE */
#paletteModal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.6);
  display:none;
  align-items:center;
  justify-content:center;
}

#palettePanel{
  background:#222;
  padding:15px;
  border-radius:12px;
  color:#fff;
}

#palette{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:10px;
}

.color{
  width:44px;
  height:44px;
  border-radius:10px;
  border:2px solid #fff;
}

/* SCROLL */
#scrollBtns{
  position:fixed;
  right:12px;
  bottom:12px;
  display:flex;
  flex-direction:column;
  gap:8px;
  z-index:9999;
}

#scrollBtns button{
  width:44px;
  height:44px;
  border-radius:50%;
  border:none;
  background:rgba(0,0,0,0.4);
  color:#fff;
  font-size:18px;
}
</style>
</head>

<body>

<div id="header">
  NEZUO CHAT
  <div class="btns">
    <button onclick="openPalette()">色</button>
    <button onclick="googleLogin()">👑</button>
  </div>
</div>

<!-- LOGIN -->
<div id="login">
  <input id="name" placeholder="名前#トリップ">
  <button onclick="join()">入室</button>
</div>

<!-- CHAT BAR -->
<div id="bar" style="display:none;">
  <input id="text" placeholder="メッセージ">
  <button onclick="send()">送信</button>
  <button onclick="exitChat()">退出</button>
  <button id="allDelBtn" style="display:none;" onclick="allDelete()">全削除</button>
</div>

<div id="chat"></div>

<!-- SCROLL -->
<div id="scrollBtns">
  <button onclick="scrollTop()">⬆</button>
  <button onclick="scrollBottom()">⬇</button>
</div>

<!-- PALETTE -->
<div id="paletteModal" onclick="closePalette(event)">
  <div id="palettePanel">
    <div id="palette"></div>
    <button onclick="closePalette({target:{id:'paletteModal'}})">閉じる</button>
  </div>
</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>

<script>
firebase.initializeApp({
  apiKey:"AIzaSyApju_6KuGq8EkXQPI0aTOysFmZ22vL5HQ",
  authDomain:"nezubo2.firebaseapp.com",
  databaseURL:"https://nezubo2-default-rtdb.firebaseio.com",
  projectId:"nezubo2"
});

const ref = firebase.database().ref("messages");

/* ADMIN */
const ADMIN_EMAIL = "h.mareto@gmail.com";
let isAdmin = false;

/* STATE */
let nickname="";
let nameColor=localStorage.getItem("nameColor")||"#ffffff";

/* DEVICE */
let deviceId = localStorage.getItem("deviceId");
if(!deviceId){
  deviceId = crypto.randomUUID();
  localStorage.setItem("deviceId",deviceId);
}

/* ===== GOOGLE LOGIN ===== */
function googleLogin(){
  const provider = new firebase.auth.GoogleAuthProvider();
  firebase.auth().signInWithPopup(provider);
}

/* AUTH STATE */
firebase.auth().onAuthStateChanged(user=>{
  if(user){
    if(user.email === ADMIN_EMAIL){
      isAdmin = true;
      document.getElementById("allDelBtn").style.display="inline-block";
    }else{
      isAdmin = false;
      document.getElementById("allDelBtn").style.display="none";
    }
  }else{
    isAdmin = false;
    document.getElementById("allDelBtn").style.display="none";
  }
});

/* JOIN */
function join(){
  nickname=document.getElementById("name").value.split("#")[0]||"名無し";
  document.getElementById("login").style.display="none";
  document.getElementById("bar").style.display="flex";
}

/* SEND */
function send(){
  const t=document.getElementById("text").value.trim();
  if(!t) return;

  ref.push({
    uid:deviceId,
    name:nickname,
    text:t,
    color:nameColor
  });

  document.getElementById("text").value="";
}

/* DISPLAY */
ref.limitToLast(80).on("child_added",s=>{
  const d=s.val();
  const key=s.key;

  const el=document.createElement("div");
  el.className="msg "+(d.uid===deviceId?"me":"");

  const header=document.createElement("div");

  const name=document.createElement("span");
  name.textContent=d.name||"名無し";
  name.style.color=d.color||"#fff";

  header.appendChild(name);

  if(isAdmin || d.uid===deviceId){
    const del=document.createElement("button");
    del.textContent="✖";
    del.className="delBtn";

    del.onclick=()=>{
      if(confirm("削除しますか？")){
        ref.child(key).remove();
        el.remove();
      }
    };

    header.appendChild(del);
  }

  const body=document.createElement("div");
  body.textContent=d.text;

  el.appendChild(header);
  el.appendChild(body);

  document.getElementById("chat").prepend(el);
});

/* ALL DELETE */
function allDelete(){
  if(!isAdmin) return;
  if(confirm("全削除しますか？")){
    ref.remove();
    document.getElementById("chat").innerHTML="";
  }
}

/* EXIT */
function exitChat(){
  location.reload();
}

/* SCROLL */
function scrollTop(){
  document.getElementById("chat").scrollTop=0;
}
function scrollBottom(){
  const c=document.getElementById("chat");
  c.scrollTop=c.scrollHeight;
}

/* PALETTE */
const palette=document.getElementById("palette");

["#ff0000","#ff8800","#ffff00","#88ff00",
 "#00ff00","#00ffaa","#00ccff","#0066ff",
 "#0000ff","#8800ff","#ff00ff","#ff0066",
 "#8b4513","#888888","#000000","#ffffff"]
.forEach(c=>{
  const el=document.createElement("div");
  el.className="color";
  el.style.background=c;

  el.onclick=()=>{
    nameColor=c;
    localStorage.setItem("nameColor",c);
    document.getElementById("paletteModal").style.display="none";
  };

  palette.appendChild(el);
});

function openPalette(){
  document.getElementById("paletteModal").style.display="flex";
}

function closePalette(e){
  if(e.target.id==="paletteModal"){
    document.getElementById("paletteModal").style.display="none";
  }
}

/* ENTER */
document.getElementById("text").addEventListener("keydown",e=>{
  if(e.key==="Enter") send();
});
document.getElementById("name").addEventListener("keydown",e=>{
  if(e.key==="Enter") join();
});
</script>

</body>
</html>
