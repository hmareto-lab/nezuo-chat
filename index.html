<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
    <title>NEZUO ONETIME CHAT</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <style>
        *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
        :root{ --primary:#007aff; --bg:#f2f4f7; --accent:#28a745; --danger:#d9363e; --dark:#2c3e50; }
        html,body{ margin:0; width:100%; height:100%; overflow:hidden; background:var(--bg); font-family:-apple-system,sans-serif; }
        body{ display:flex; justify-content:center; } 
        #lobby, #mainApp { display:none; }
        
        #mainApp{ flex-direction:column; width:100%; height:100svh; max-width:800px; background:#fff; position:relative; }
        #lobby{ position:fixed; inset:0; justify-content:center; align-items:center; background:linear-gradient(135deg,#f5f7fa,#c3cfe2); z-index:1000; display:flex; }
        .lobby-content{ width:90%; max-width:380px; background:#fff; border-radius:28px; padding:25px; box-shadow:0 20px 40px rgba(0,0,0,.15); display:flex; flex-direction:column; gap:12px; max-height: 95vh; overflow-y: auto; }
        .lobby-input{ width:100%; height:46px; border:1px solid #eee; border-radius:12px; background:#f9fbff; padding:0 15px; font-size:16px; outline:none; }
        
        .info-box { background:#f8f9fa; border-radius:16px; padding:15px; font-size:12px; line-height:1.6; color:#495057; border:1px solid #efefef; }
        .info-title { display:flex; align-items:center; gap:8px; margin-bottom:6px; font-weight:bold; color:var(--dark); }
        .info-title span { color:var(--primary); font-size:16px; }
        .rules-link { font-size:12px; text-align:center; margin:5px 0; color:var(--primary); text-decoration:underline; cursor:pointer; font-weight:bold; }

        #modal { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.7); z-index:2000; align-items:center; justify-content:center; backdrop-filter:blur(5px); padding:20px; }
        .modal-content { width:100%; max-width:360px; background:#fff; border-radius:24px; padding:20px; max-height:90vh; position:relative; }
        .modal-body { font-size:12px; color:#555; white-space:pre-wrap; line-height:1.5; }
        .modal-btn-close { width:100%; height:44px; background:var(--primary); color:#fff; border:none; border-radius:12px; margin-top:15px; font-weight:bold; cursor:pointer; }

        #header{ background:#fff; border-bottom:1px solid #ececec; padding-top:env(safe-area-inset-top); z-index: 10; }
        .app-header-top{ display:flex; align-items:flex-end; gap:0; padding:12px; }
        
        textarea{ 
            flex:1; height:42px; min-height:42px; max-height:120px; 
            padding:10px 15px; background:#f1f3f5; border-radius:20px 0 0 20px; font-size:16px; 
            border:none; outline:none; scrollbar-width:none; overflow-y:auto; margin-right:-1px; resize:none;
        }
        #clearBtn { width:36px; height:42px; background:#f1f3f5; border:none; color:#adb5bd; font-size:20px; cursor:pointer; display:flex; align-items:center; justify-content:center; margin-right:-1px; }
        #sendBtn{ width:70px; height:42px; border:none; border-radius: 0 20px 20px 0; background:var(--primary); color:#fff; font-weight:800; cursor:pointer; }
        
        .room-info-bar{ display:flex; justify-content:space-between; align-items:center; padding:6px 12px; border-top:1px solid #f6f6f6; background:#fcfcfc; }
        .info-item{ background:#f1f1f1; padding:3px 8px; border-radius:5px; font-size:10px; font-weight:700; color:#666; }
        #presenceList { display:flex; gap:5px; overflow-x:auto; flex:1; margin:0 10px; }
        .user-chip { background:var(--primary); color:#fff; padding:2px 8px; border-radius:10px; font-size:10px; white-space:nowrap; }

        #chatWrap{ flex:1; overflow-y:auto; padding:15px 12px; background:#f7f8fa; display:flex; flex-direction:column; }
        #list { display:flex; flex-direction:column-reverse; gap:12px; }
        .msg-wrap{ display:flex; flex-direction:column; }
        .msg{ background:#fff; border-radius:18px; padding:8px 14px; max-width:85%; box-shadow:0 1px 2px rgba(0,0,0,.05); align-self:flex-start; }
        .msg-text{ font-size:15px; line-height:1.5; white-space:pre-wrap; word-break:break-word; }
        .msg-meta{ font-size:10px; color:#999; margin:4px 0 0 8px; }
        .sys-msg{ align-self:center; color:#555; font-size:11px; font-weight:bold; margin:10px 0; background:#e9ecef; padding:4px 12px; border-radius:12px; }
        
        #footer{ background:#fff; border-top:1px solid #ececec; padding:8px 10px calc(8px + env(safe-area-inset-bottom)); }
        .footer-nav{ display:grid; grid-template-columns: 50px 44px 44px 1fr 70px; gap:8px; align-items:center; }
        .btn{ border:none; border-radius:12px; display:flex; align-items:center; justify-content:center; font-weight:800; height:42px; cursor:pointer; font-size:11px; }
    </style>
</head>
<body>

<div id="modal" onclick="this.style.display='none'">
    <div class="modal-content">
        <div id="modalText" class="modal-body"></div>
        <button class="modal-btn-close">閉じる</button>
    </div>
</div>

<div id="lobby" style="display:flex;">
    <div class="lobby-content">
        <div style="text-align:center;">
            <h2 style="color:var(--primary);margin:0;font-size:24px;">NEZUO ONETIME CHAT</h2>
            <p style="margin:2px 0 0 0;font-size:11px;font-weight:bold;color:#999;">誰でも簡単に使える、安心な消えるチャット</p>
        </div>
        <div class="info-box">
            <div class="info-title"><span>🔒</span>システム概要</div>
            当ルームは、全利用者の退室に伴い通信履歴が自動消滅する一時的なチャットシステムです。AES-256規格による暗号化を実装しており、運営者を含む第三者による内容の傍受は不可能です。
        </div>
        <input id="ni" class="lobby-input" maxlength="10" placeholder="表示名">
        <div>
            <input id="tk" class="lobby-input" placeholder="本人確認用キー">
            <div id="tp" style="font-size:11px;color:var(--accent);text-align:right;height:18px;font-weight:bold;margin-top:2px;"></div>
        </div>
        <input id="ri" class="lobby-input" placeholder="部屋ID">
        <input id="pi" class="lobby-input" placeholder="暗号化パスワード">
        <button id="masterGenBtn" style="width:100%;height:40px;border:1px dashed var(--primary);background:#f0f7ff;border-radius:12px;color:var(--primary);cursor:pointer;font-weight:bold;font-size:12px;">🎲 認証情報の自動生成</button>
        <div class="rules-link" onclick="showRules()">利用規約および免責事項を確認</div>
        <button id="enterBtn" style="width:100%;height:60px;border:none;border-radius:20px;background:var(--primary);color:#fff;font-size:18px;font-weight:900;cursor:pointer;">認証して入室</button>
    </div>
</div>

<div id="mainApp">
    <header id="header">
        <div class="app-header-top">
            <textarea id="mi" placeholder="メッセージを作成..." maxlength="500"></textarea>
            <button id="clearBtn">×</button>
            <button id="sendBtn">送信</button>
        </div>
        <div class="room-info-bar">
            <div id="roomDisplay" class="info-item"></div>
            <div id="presenceList"></div>
            <div id="presenceCount" style="font-size:10px;color:#999;font-weight:bold;"></div>
        </div>
    </header>
    <main id="chatWrap"><div id="list"></div></main>
    <footer id="footer">
        <div class="footer-nav">
            <button id="focusBtn" class="btn" style="background:var(--primary);color:#fff;font-size:20px;">⌨️</button>
            <button id="toTopBtn" class="btn" style="background:#f0f2f5;">↑</button>
            <button id="toBottomBtn" class="btn" style="background:#f0f2f5;">↓</button>
            <button id="copyBtn" class="btn" style="background:var(--dark);color:#fff;">招待URLのコピー</button>
            <button id="exitBtn" class="btn" style="background:#fff0f0;color:var(--danger);">退出</button>
        </div>
    </footer>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
import { getDatabase, ref, push, onValue, set, remove, onDisconnect, serverTimestamp, query, orderByChild } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-database.js";

const $ = id => document.getElementById(id);
const db = getDatabase(initializeApp({apiKey: "AIzaSyApju_6KuGq8EkXQPI0aTOysFmZ22vL5HQ", databaseURL: "https://nezuochat-default-rtdb.asia-southeast1.firebasedatabase.app"}));
const uid = crypto.randomUUID();
let curR, curP, curN, rawR, lastT=0;
let userCount = 0;

const scrollUp = () => $("chatWrap").scrollTo({top: 0, behavior: 'smooth'});
const hash = t => CryptoJS.SHA256(t).toString();
const enc = (t,k) => CryptoJS.AES.encrypt(t,k).toString();
const dec = (c,k) => { try { return CryptoJS.AES.decrypt(c,k).toString(CryptoJS.enc.Utf8) || null; } catch { return null; } };
const esc = t => (t||"").replace(/[&<>"']/g,c=>({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" }[c]));

window.showRules = () => {
    $("modalText").innerText = "【利用規約および運用ポリシー】\n\n1. データの消滅について\n当システムは揮発性の高い環境で運用されています。滞在者が0名となった時点で、データベース上の全暗号化ログは即時に完全抹消されます。\n\n2. セキュリティと機密保持\nすべての通信内容は、エンドユーザーの端末上でAES-256暗号化処理が行われます。パスワードの保持者以外、第三者が内容を閲覧することは技術的に不可能です。";
    $("modal").style.display = "flex";
};

async function join(rID, pass, name) {
    rawR = rID; curR = hash(rID); curP = pass; curN = name;
    $("roomDisplay").innerText = rID; $("lobby").style.display = "none"; $("mainApp").style.display = "flex";
    
    const chatRef = ref(db, `chat/${curR}`), presRef = ref(db, `presence/${curR}`), myPres = ref(db, `presence/${curR}/${uid}`);
    
    // 入室通知
    await push(chatRef, { type: "sys", text: enc(`${name}さんが入室しました`, pass), time: serverTimestamp() });
    
    // ロジック：タブを閉じた際に即座に在室リストから削除
    onDisconnect(myPres).remove();

    onValue(presRef, s => {
        const users = s.val() || {}; $("presenceList").innerHTML = "";
        const keys = Object.keys(users);
        userCount = keys.length;
        keys.forEach(k => {
            const dN = dec(users[k].nEnc, curP);
            if(dN){ const span = document.createElement("span"); span.className="user-chip"; span.innerText=dN; $("presenceList").appendChild(span); }
        });
        $("presenceCount").innerText = `(${userCount}名)`;
        
        // ロジック：最後の一人なら、接続が切れたときに部屋ごと消去するように予約
        if (userCount <= 1) {
            onDisconnect(chatRef).remove();
            onDisconnect(presRef).remove();
        } else {
            // 他に人がいるなら自分の退出通知だけ予約（実際はボタンから行うのが確実）
            onDisconnect(chatRef).cancel();
            onDisconnect(presRef).cancel();
        }
    });

    onValue(query(chatRef, orderByChild("time")), s => {
        $("list").innerHTML = "";
        s.forEach(c => {
            const m = c.val(); const txt = dec(m.text, curP); if(!txt) return;
            const time = new Date(m.time).toLocaleTimeString([], {hour:'2-digit',minute:'2-digit',second:'2-digit'});
            const div = document.createElement("div"); div.className = "msg-wrap";
            if(m.type === "sys") div.innerHTML = `<div class="sys-msg">${esc(txt)}</div>`;
            else {
                const n = dec(m.nEnc, curP) || "???";
                div.innerHTML = `<div style="margin-left:8px;font-size:10px;font-weight:bold;color:#666;">${esc(n)}</div><div class="msg"><div class="msg-text">${esc(txt)}</div></div><div class="msg-meta">${time}</div>`;
            }
            $("list").appendChild(div);
        });
    });

    const upd = () => set(myPres, { nEnc: enc(name, pass), last: serverTimestamp() });
    upd(); setInterval(upd, 20000);
}

// 送信ロジック
const sendMsg = async () => {
    const v = $("mi").value.trim(); if(!v||Date.now()-lastT<300) return;
    lastT=Date.now(); await push(ref(db, `chat/${curR}`), { nEnc:enc(curN,curP), text:enc(v,curP), time:serverTimestamp() });
    $("mi").value = ""; $("mi").style.height="42px"; 
    scrollUp();
};

// 退出・部屋削除ロジック
$("exitBtn").onclick = async () => {
    if(userCount <= 1) {
        if(!confirm("あなたが最後の一人です。退出すると全データが消滅しますがよろしいですか？")) return;
        // 最後の一人の場合はデータごと消す
        await remove(ref(db, `chat/${curR}`));
        await remove(ref(db, `presence/${curR}`));
    } else {
        // 他に人がいる場合は退出通知だけ送って自分の presence を消す
        await push(ref(db, `chat/${curR}`), { type: "sys", text: enc(`${curN}さんが退出しました`, curP), time: serverTimestamp() });
        await remove(ref(db, `presence/${curR}/${uid}`));
    }
    location.reload(); // ロビーへ
};

$("sendBtn").onclick = sendMsg;
$("mi").onkeydown = (e) => { if (e.key === "Enter" && !e.shiftKey && !e.isComposing) { e.preventDefault(); sendMsg(); } };
$("focusBtn").onclick = () => { $("mi").focus(); scrollUp(); };
$("mi").onfocus = scrollUp;

$("enterBtn").onclick = () => {
    const r=$("ri").value.trim(), p=$("pi").value.trim(), n=$("ni").value.trim()||"名無し", tp=$("tp").innerText;
    if(r&&p){ localStorage.setItem("nez_n", n); localStorage.setItem("nez_t", $("tk").value); join(r, p, n + tp); }
    else alert("部屋IDおよびパスワードの入力が必要です。");
};

$("copyBtn").onclick = async () => {
    const url = `${location.origin}${location.pathname}?r=${encodeURIComponent(rawR)}&p=${encodeURIComponent(curP)}`;
    const copyToClipboard = (val) => {
        const area = document.createElement("textarea");
        area.value = val;
        area.style.position = "fixed";
        area.style.left = "-9999px";
        area.style.top = "0";
        document.body.appendChild(area);
        area.focus();
        area.select();
        let success = false;
        try { success = document.execCommand("copy"); } catch (err) {}
        document.body.removeChild(area);
        return success;
    };

    let done = false;
    if (navigator.clipboard && navigator.clipboard.writeText) {
        try { await navigator.clipboard.writeText(url); done = true; } catch (err) { done = copyToClipboard(url); }
    } else { done = copyToClipboard(url); }

    if (done) {
        const b = $("copyBtn"); b.innerText = "コピー完了";
        setTimeout(() => b.innerText = "招待URLのコピー", 1500);
    }
};

$("toTopBtn").onclick = scrollUp;
$("toBottomBtn").onclick = () => $("chatWrap").scrollTo({top: $("chatWrap").scrollHeight, behavior: 'smooth'});
$("clearBtn").onclick = () => { $("mi").value = ""; $("mi").focus(); };
$("masterGenBtn").onclick = () => { $("ri").value = Math.random().toString(36).slice(2,10); $("pi").value = Math.random().toString(36).slice(2,12); };

$("tk").oninput = async (e) => {
    const v = e.target.value.trim(); if(!v) { $("tp").innerText = ""; return; }
    const b = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(v));
    $("tp").innerText = "◆" + Array.from(new Uint8Array(b)).map(x=>x.toString(36)).join("").slice(2,8);
};

window.onload = () => {
    const sN = localStorage.getItem("nez_n"), sT = localStorage.getItem("nez_t");
    if(sN) $("ni").value = sN; if(sT) { $("tk").value = sT; $("tk").dispatchEvent(new Event('input')); }
    const u = new URLSearchParams(window.location.search);
    if(u.get('r') && u.get('p')) { $("ri").value = u.get('r'); $("pi").value = u.get('p'); }
};
</script>
</body>
</html>
