<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
    <title>NEZUO ONETIME CHAT</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <style>
        *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
        :root{ --primary:#007aff; --bg:#f2f4f7; --accent:#28a745; --danger:#d9363e; --dark:#2c3e50; }
        html,body{ margin:0; width:100%; height:100%; overflow:hidden; background:var(--bg); font-family:-apple-system,sans-serif; }
        body{ display:flex; justify-content:center; } 
        #lobby, #mainApp { display:none; }
        
        #mainApp{ flex-direction:column; width:100%; height:100svh; max-width:800px; background:#fff; position:relative; }
        #lobby{ position:fixed; inset:0; justify-content:center; align-items:center; background:linear-gradient(135deg,#f5f7fa,#c3cfe2); z-index:1000; display:flex; }
        .lobby-content{ width:90%; max-width:380px; background:#fff; border-radius:28px; padding:25px; box-shadow:0 20px 40px rgba(0,0,0,.15); display:flex; flex-direction:column; gap:12px; max-height: 95vh; overflow-y: auto; }
        .lobby-input{ width:100%; height:46px; border:1px solid #eee; border-radius:12px; background:#f9fbff; padding:0 15px; font-size:16px; outline:none; }
        
        .info-box { background:#f8f9fa; border-radius:16px; padding:15px; font-size:12px; line-height:1.6; color:#495057; border:1px solid #efefef; }
        .info-title { display:flex; align-items:center; gap:8px; margin-bottom:6px; font-weight:bold; color:var(--dark); }
        .info-title span { color:var(--primary); font-size:16px; }

        .rules-link { font-size:12px; text-align:center; margin:5px 0; color:var(--primary); text-decoration:underline; cursor:pointer; font-weight:bold; }

        #modal { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.7); z-index:2000; align-items:center; justify-content:center; backdrop-filter:blur(5px); padding:20px; }
        .modal-content { width:100%; max-width:360px; background:#fff; border-radius:24px; padding:25px; max-height:80vh; overflow-y:auto; position:relative; animation: modalOpen 0.2s ease-out; }
        @keyframes modalOpen { from { opacity:0; transform:scale(0.95); } to { opacity:1; transform:scale(1); } }
        .modal-body { font-size:13px; color:#555; white-space:pre-wrap; line-height:1.7; }
        .modal-btn-close { width:100%; height:48px; background:var(--primary); color:#fff; border:none; border-radius:12px; margin-top:20px; font-weight:bold; cursor:pointer; }

        #header{ background:#fff; border-bottom:1px solid #ececec; padding-top:env(safe-area-inset-top); z-index: 10; }
        .app-header-top{ display:flex; align-items:flex-end; gap:8px; padding:12px; }
        
        /* 縦線（境界線）を徹底排除 */
        textarea{ 
            flex:1; height:42px; min-height:42px; max-height:120px; padding:10px 15px; 
            border:none !important; 
            outline:none !important; 
            box-shadow:none !important; 
            -webkit-appearance:none !important; 
            -moz-appearance:none !important;
            appearance:none !important;
            resize:none; 
            background:#f1f3f5; 
            border-radius:20px; 
            font-size:16px; 
            line-height:1.4;
            /* 一部のブラウザで残る内側の影や線を消去 */
            -webkit-box-shadow: none !important;
            border-inline-end: none !important;
            border-right: none !important;
        }
        
        #sendBtn{ width:70px; height:42px; border:none; border-radius:20px; background:var(--primary); color:#fff; font-weight:800; cursor:pointer; }
        #sendBtn:disabled { opacity: 0.5; }
        
        .room-info-bar{ display:flex; justify-content:space-between; align-items:center; padding:6px 12px; border-top:1px solid #f6f6f6; background:#fcfcfc; }
        .info-item{ background:#f1f1f1; padding:3px 8px; border-radius:5px; font-size:10px; font-weight:700; color:#666; }
        #presenceList { display:flex; gap:5px; overflow-x:auto; flex:1; margin:0 10px; }
        .user-chip { background:var(--primary); color:#fff; padding:2px 8px; border-radius:10px; font-size:10px; white-space:nowrap; }

        #chatWrap{ flex-direction:column; flex:1; overflow-y:auto; padding:15px 12px; background:#f7f8fa; display:flex; }
        #list{ display:flex; flex-direction:column; gap:12px; }
        
        .msg-wrap{ display:flex; flex-direction:column; margin-bottom: 4px; }
        .msg{ background:#fff; border-radius:18px; padding:8px 14px; max-width:85%; box-shadow:0 1px 2px rgba(0,0,0,.05); align-self: flex-start; }
        .msg-text{ font-size:15px; line-height:1.5; white-space:pre-wrap; word-break:break-word; }
        .msg-meta{ font-size:10px; color:#999; margin:4px 0 8px 8px; }
        .sys-msg{ align-self:center; color:#555; font-size:11px; font-weight:bold; margin:10px 0; background:#e9ecef; padding:4px 12px; border-radius:12px; }
        
        #footer{ background:#fff; border-top:1px solid #ececec; padding:8px 10px calc(8px + env(safe-area-inset-bottom)); }
        .footer-nav{ display:grid; grid-template-columns: 60px 44px 44px 1.2fr 80px; gap:8px; align-items:center; }
        .btn{ border:none; border-radius:12px; display:flex; align-items:center; justify-content:center; font-weight:800; height:42px; cursor:pointer; font-size:11px; }
    </style>
</head>
<body>

<div id="modal">
    <div class="modal-content">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
            <h3 style="margin:0; font-size:18px;">利用規約とガイドライン</h3>
            <span style="cursor:pointer; font-size:28px; font-weight:bold; color:#ccc; line-height:1;" onclick="document.getElementById('modal').style.display='none'">&times;</span>
        </div>
        <div id="modalText" class="modal-body"></div>
        <button class="modal-btn-close" onclick="document.getElementById('modal').style.display='none'">同意して閉じる</button>
    </div>
</div>

<div id="lobby">
    <div class="lobby-content">
        <div style="text-align:center;">
            <h2 style="color:var(--primary);margin:0;font-size:24px;letter-spacing:-0.5px;">NEZUO ONETIME CHAT</h2>
            <p style="margin:2px 0 0 0;font-size:11px;font-weight:bold;color:#999;">安心・安全な使い捨て暗号化チャット</p>
        </div>
        
        <div class="info-box">
            <div class="info-title"><span>🔒</span>ルーム説明</div>
            全員が退室すると履歴が<b>物理的に消滅</b>する使い捨てチャットです。AES-256形式の暗号化により、運営者を含む第三者は内容を一切解読できません。
        </div>

        <input id="ni" class="lobby-input" maxlength="10" placeholder="表示名 (例: 匿名ネズオ)">
        <div>
            <input id="tk" class="lobby-input" placeholder="なりすまし防止コード (任意)">
            <div id="tp" style="font-size:10px;color:var(--accent);text-align:right;height:16px;padding-right:5px;font-weight:bold;"></div>
        </div>
        <input id="ri" class="lobby-input" placeholder="部屋ID (共通のものを使用)">
        <input id="pi" class="lobby-input" placeholder="暗号化パスワード">
        
        <button id="masterGenBtn" style="width:100%;height:44px;border:1px dashed var(--primary);background:#f0f7ff;border-radius:12px;color:var(--primary);cursor:pointer;font-weight:bold;font-size:13px;">🎲 IDとパスを自動生成</button>
        
        <div class="rules-link" onclick="showRules()">利用規約・ガイドラインを確認</div>

        <button id="enterBtn" style="width:100%;height:60px;border:none;border-radius:20px;background:var(--primary);color:#fff;font-size:18px;font-weight:900;cursor:pointer;box-shadow:0 8px 15px rgba(0,122,255,0.3);">入室する</button>
    </div>
</div>

<div id="mainApp">
    <header id="header">
        <div class="app-header-top">
            <textarea id="mi" placeholder="暗号化メッセージを送信..." maxlength="500"></textarea>
            <button id="sendBtn">送信</button>
        </div>
        <div class="room-info-bar">
            <div id="roomDisplay" class="info-item"></div>
            <div id="presenceList"></div>
            <div id="presenceCount" style="font-size:10px;color:#999;font-weight:bold;"></div>
        </div>
    </header>
    <main id="chatWrap"><div id="list"></div></main>
    <footer id="footer">
        <div class="footer-nav">
            <button id="focusBtn" class="btn" style="background:var(--primary);color:#fff;font-size:20px;">⌨️</button>
            <button id="toTopBtn" class="btn" style="background:#f0f2f5;">↑</button>
            <button id="toBottomBtn" class="btn" style="background:#f0f2f5;">↓</button>
            <button id="copyBtn" class="btn" style="background:var(--dark);color:#fff;">招待URL生成</button>
            <button id="exitBtn" class="btn" style="background:#fff0f0;color:var(--danger);">退室</button>
        </div>
    </footer>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
import { getDatabase, ref, push, onValue, set, remove, onDisconnect, serverTimestamp, query, orderByChild } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyApju_6KuGq8EkXQPI0aTOysFmZ22vL5HQ",
  databaseURL: "https://nezuochat-default-rtdb.asia-southeast1.firebasedatabase.app"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const uid = crypto.randomUUID();

const $ = id => document.getElementById(id);
let curR=null, curP=null, curN=null, lastT=0, rawR="", userCount=0;

const scrollToLatest = () => { $("chatWrap").scrollTop = 0; };
const scrollToOldest = () => { $("chatWrap").scrollTop = $("chatWrap").scrollHeight; };

window.showRules = () => {
    $("modalText").innerText = `NEZUO ONETIME CHATをご利用いただきありがとうございます。本サービスは「プライバシーと一過性」を最優先したチャットツールです。

【1. コンセプトとデータ保護】
・本サービスはP2P思考の暗号化を採用しています。入力されたメッセージは送信前にブラウザ内で暗号化され、サーバーには解読不能な文字列としてのみ送信されます。
・部屋の接続人数が「0」になった瞬間、その部屋の全データ（メッセージ・設定）はサーバーから物理的に削除され、いかなる方法でも復元できません。

【2. セキュリティの責任範囲】
・パスワードは暗号鍵そのものです。紛失した場合、過去のログを読むことは二度とできません。
・パスワードは信頼できる相手とのみ共有してください。

【3. 禁止事項】
・法令に抵触する行為、他者への誹謗中傷、嫌がらせ、荒らし行為。
・システムの脆弱性を突く、または過度な負荷をかける行為。

【4. 免責事項】
・本サービスは「現状有姿」で提供されます。通信エラーや予期せぬ切断によるデータ消失、その他本サービスを利用したことで生じたあらゆる損害について、開発者は一切の責任を負いません。
・情報の永続性や完全な機密性を100%保証するものではありません。`;
    $("modal").style.display = "flex";
};

window.onclick = (e) => { if (e.target == $("modal")) $("modal").style.display = "none"; };

const hash = t => CryptoJS.SHA256(t).toString();
const enc = (t,k) => CryptoJS.AES.encrypt(t,k).toString();
const dec = (c,k) => { try { return CryptoJS.AES.decrypt(c,k).toString(CryptoJS.enc.Utf8) || null; } catch { return null; } };
const esc = t => (t||"").replace(/[&<>"']/g,c=>({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" }[c]));

function renderMsg(m, p) {
    const decodedText = dec(m.text, p);
    if (!decodedText) return; 
    const time = new Date(m.time).toLocaleTimeString([], {hour:'2-digit',minute:'2-digit',second:'2-digit'});
    const div = document.createElement("div"); div.className="msg-wrap";
    if(m.type==="sys"){
        div.innerHTML = `<div class="sys-msg">${esc(decodedText)} (${time})</div>`;
    }else{
        const decodedName = dec(m.nEnc, p) || "???";
        div.innerHTML = `<div style="margin-left:10px;font-size:11px;font-weight:800;color:#666;">${esc(decodedName)}</div>
         <div class="msg"><div class="msg-text">${esc(decodedText).replace(/(https?:\/\/[\w\/:%#\$&\?\(\)~\.=\+\-]+)/g,'<a target="_blank" href="$1">$1</a>')}</div></div>
         <div class="msg-meta">${time}</div>`;
    }
    $("list").prepend(div); 
}

async function join(rID, pass, name) {
    rawR = rID; 
    curR = hash(rID); curP = pass; curN = name;
    $("roomDisplay").innerText = rID; $("lobby").style.display = "none"; $("mainApp").style.display = "flex";
    const chatRef = ref(db, `chat/${curR}`), presRef = ref(db, `presence/${curR}`), myPres = ref(db, `presence/${curR}/${uid}`);
    
    await push(chatRef, { type: "sys", text: enc(`${name}さんが入室しました`, pass), time: serverTimestamp() });

    onValue(presRef, (s) => {
        const users = s.val() || {};
        const activeKeys = Object.keys(users);
        userCount = activeKeys.length;
        $("presenceList").innerHTML = "";
        activeKeys.forEach(k => {
            const dName = dec(users[k].nEnc, curP);
            if(dName){
                const span = document.createElement("span"); span.className="user-chip"; span.innerText=dName;
                $("presenceList").appendChild(span);
            }
        });
        $("presenceCount").innerText = `(${userCount}名)`;
        onDisconnect(myPres).remove();
        if (userCount <= 1) { onDisconnect(chatRef).remove(); onDisconnect(presRef).remove(); } 
        else { onDisconnect(chatRef).push({ type:"sys", text:enc(`${curN}さんが退室しました`, curP), time: serverTimestamp() }); }
    });

    const chatQuery = query(chatRef, orderByChild("time"));
    onValue(chatQuery, s => { 
        if(!s.exists()) return;
        $("list").innerHTML=""; 
        s.forEach(child => { renderMsg(child.val(), pass); });
        scrollToLatest();
    });
    
    const update = () => set(myPres, { nEnc: enc(name, pass), last: serverTimestamp() });
    update(); setInterval(update, 20000);
}

$("masterGenBtn").onclick=()=>{ 
    $("ri").value=Math.random().toString(36).slice(2,10); 
    $("pi").value=Math.random().toString(36).slice(2,12); 
};

$("enterBtn").onclick=()=>{
    const r=$("ri").value.trim(), p=$("pi").value.trim(), n=$("ni").value.trim()||"名無し", t=$("tk").value.trim();
    if(!r||!p){ alert("部屋IDとパスワードを入力してください"); return; }
    localStorage.setItem("nez_n", n); localStorage.setItem("nez_t", t);
    join(r, p, n + $("tp").innerText);
};

const updateTrip = async (v) => {
    if(!v){$("tp").innerText="";return;}
    const b=await crypto.subtle.digest("SHA-256",new TextEncoder().encode(v));
    $("tp").innerText="◆"+Array.from(new Uint8Array(b)).map(x=>x.toString(36)).join("").slice(2,8);
};
$("tk").oninput=(e)=>updateTrip(e.target.value);

$("exitBtn").onclick = async () => {
    if(confirm(userCount <= 1 ? "最後の一人です。退室するとログが消滅します。" : "退室しますか？")) {
        const chatRef = ref(db, `chat/${curR}`), presRef = ref(db, `presence/${curR}`), myPres = ref(db, `presence/${curR}/${uid}`);
        if (userCount <= 1) { await remove(chatRef); await remove(presRef); } 
        else { await push(chatRef, { type: "sys", text: enc(`${curN}さんが退室しました`, curP), time: serverTimestamp() }); await remove(myPres); }
        location.href=location.origin+location.pathname;
    }
};

const doSend = async () => {
    const v=$("mi").value.trim(); if(!v||!curR||Date.now()-lastT<300) return;
    lastT=Date.now(); $("sendBtn").disabled=true;
    try{ 
        await push(ref(db,`chat/${curR}`),{ nEnc:enc(curN,curP), text:enc(v,curP), time:serverTimestamp() }); 
        $("mi").value=""; $("mi").style.height="42px";
        scrollToLatest();
    }catch(e){}
    $("sendBtn").disabled=false;
    $("mi").focus();
};
$("sendBtn").onclick=doSend;
$("mi").onkeydown=e=>{ if(e.key==="Enter"&&!e.shiftKey&&!e.isComposing){ e.preventDefault(); doSend(); } };

$("copyBtn").onclick=()=>{
    if(!rawR || !curP) { alert("エラー：入室情報が取得できません。"); return; }
    const url = `${location.origin}${location.pathname}?r=${encodeURIComponent(rawR)}&p=${encodeURIComponent(curP)}`;
    const b = $("copyBtn");
    const old = "招待URL生成";
    
    const finish = () => {
        b.innerText = "コピー完了";
        setTimeout(() => b.innerText = old, 1500);
    };

    if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(url).then(finish).catch(() => {
            const dummy = document.createElement("textarea");
            document.body.appendChild(dummy);
            dummy.value = url; dummy.select();
            document.execCommand("copy");
            document.body.removeChild(dummy);
            finish();
        });
    } else {
        const dummy = document.createElement("textarea");
        document.body.appendChild(dummy);
        dummy.value = url; dummy.select();
        document.execCommand("copy");
        document.body.removeChild(dummy);
        finish();
    }
};

$("toTopBtn").onclick=scrollToLatest;
$("toBottomBtn").onclick=scrollToOldest;
$("focusBtn").onclick=()=>{ $("mi").focus(); scrollToLatest(); };

window.onload=()=>{
    const sN = localStorage.getItem("nez_n"), sT = localStorage.getItem("nez_t");
    if(sN) $("ni").value = sN;
    if(sT){ $("tk").value = sT; updateTrip(sT); }
    const u=new URLSearchParams(window.location.search), r=u.get('r'), p=u.get('p');
    if(r&&p){ $("ri").value=r; $("pi").value=p; }
};
</script>
</body>
</html>
