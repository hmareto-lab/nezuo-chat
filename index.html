<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>NEZUO CHAT THREAD MODE</title>

<style>

html,body{
  margin:0;
  height:100%;
  overflow:hidden;
  background:linear-gradient(135deg,#d7dde5,#b8c2cf);
  font-family:-apple-system,BlinkMacSystemFont,sans-serif;
}

/* HEADER */
#header{
  position:fixed;
  top:0;
  left:0;
  right:0;
  z-index:9000;
  padding:calc(env(safe-area-inset-top) + 10px) 10px 10px;
  display:flex;
  flex-direction:column;
  gap:6px;
  background:rgba(255,255,255,.14);
  border-bottom:1px solid rgba(255,255,255,.25);
  backdrop-filter:blur(14px);
}

#replyBar{
  display:none;
  font-size:12px;
  padding:6px 10px;
  border-radius:10px;
  background:rgba(0,0,0,.15);
  color:#fff;
}

#msgInputWrap{
  display:flex;
  gap:8px;
}

#msgInput{
  flex:1;
  height:42px;
  border:none;
  outline:none;
  border-radius:12px;
  padding:0 12px;
  background:rgba(255,255,255,.64);
  font-size:15px;
}

button{
  border:none;
  border-radius:12px;
  color:#fff;
  font-weight:700;
  cursor:pointer;
}

#sendBtn{
  width:70px;
  height:42px;
  background:rgba(40,48,58,.84);
}

/* CHAT */
#chatWrap{
  position:fixed;
  top:100px;
  bottom:84px;
  left:0;
  right:0;
  overflow-y:auto;
  padding:14px;
  display:flex;
  flex-direction:column;
  gap:14px;
}

/* THREAD */
.thread{
  display:flex;
  flex-direction:column;
  gap:6px;
}

.threadHeader{
  display:flex;
  align-items:center;
  gap:8px;
}

/* collapse */
.collapseBtn{
  width:24px;
  height:24px;
  border-radius:6px;
  background:rgba(0,0,0,.25);
  color:#fff;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:12px;
}

/* MESSAGE */
.msg{
  max-width:78%;
  padding:10px 12px;
  border-radius:18px;
  word-break:break-word;
  position:relative;
  box-shadow:0 4px 18px rgba(0,0,0,.08);
}

.me{
  align-self:flex-end;
  background:rgba(40,48,58,.78);
  color:#fff;
}

.other{
  align-self:flex-start;
  background:rgba(255,255,255,.62);
  color:#111;
}

/* CHILD */
.replyChild{
  margin-left:30px;
  max-width:72%;
  padding:8px 10px;
  border-radius:14px;
  font-size:13px;
  opacity:0.95;
}

/* NAME */
.mine-name{
  background:#000;
  color:#fff;
  padding:2px 8px;
  border-radius:8px;
  font-size:13px;
}

.other-name{
  background:#fff;
  color:#000;
  padding:2px 8px;
  border-radius:8px;
  border:1px solid #000;
  font-size:13px;
}

/* ACTION */
.delBtn,.replyBtn{
  position:absolute;
  width:22px;
  height:22px;
  border-radius:6px;
  color:#fff;
  font-size:12px;
  font-weight:900;
  display:flex;
  align-items:center;
  justify-content:center;
}

/* 削除 */
.delBtn{
  top:6px;
  right:6px;
  background:rgba(255,0,0,0.45);
}

/* 返信（右下） */
.replyBtn{
  bottom:6px;
  right:32px;
  background:rgba(0,120,255,0.45);
}

/* FOOTER */
#footer{
  position:fixed;
  left:0;
  right:0;
  bottom:0;
  padding:calc(env(safe-area-inset-bottom) + 10px) 10px 10px;
  display:grid;
  grid-template-columns:44px 44px 1fr auto;
  gap:12px;
  background:rgba(255,255,255,.14);
  border-top:1px solid rgba(255,255,255,.25);
  backdrop-filter:blur(14px);
}

#upBtn,#downBtn,#nameBtn{
  height:44px;
  border-radius:14px;
  background:rgba(40,48,58,.78);
}

</style>
</head>

<body>

<div id="header">
  <div id="replyBar"></div>
  <div id="msgInputWrap">
    <input id="msgInput" placeholder="メッセージ" />
    <button id="sendBtn">送信</button>
  </div>
</div>

<div id="chatWrap"></div>

<div id="footer">
  <button id="upBtn">↑</button>
  <button id="downBtn">↓</button>
  <div></div>
  <button id="nameBtn">名前</button>
</div>

<script type="module">

let started=false;
window.addEventListener("load",startChat);

async function startChat(){
if(started)return;
started=true;

const { initializeApp } =
await import("https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js");

const {
  getDatabase,
  ref,
  push,
  onChildAdded,
  remove,
  query,
  limitToLast
} = await import("https://www.gstatic.com/firebasejs/9.23.0/firebase-database.js");

const app = initializeApp({
  apiKey:"AIzaSyApju_6KuGq8EkXQPI0aTOysFmZ22vL5HQ",
  authDomain:"nezubo2.firebaseapp.com",
  databaseURL:"https://nezubo2-default-rtdb.firebaseio.com",
  projectId:"nezubo2"
});

const db=getDatabase(app);
const chatRef=query(ref(db,"chat"),limitToLast(80));

const ADMIN_UID="eobk3m5b";

let uid=localStorage.getItem("uid")||crypto.randomUUID();
localStorage.setItem("uid",uid);

let userName=localStorage.getItem("userName")||"名無し";

const chatWrap=document.getElementById("chatWrap");
const msgInput=document.getElementById("msgInput");
const sendBtn=document.getElementById("sendBtn");
const nameBtn=document.getElementById("nameBtn");
const replyBar=document.getElementById("replyBar");

nameBtn.textContent=userName;

/* STATE */
let replyingTo=null;

const messages=new Map();
const threads=new Map();
const collapsedMap=new Map();

/* 名前変更 */
nameBtn.onclick=()=>{
  const n=prompt("名前変更",userName);
  if(!n)return;
  userName=n.slice(0,20);
  localStorage.setItem("userName",userName);
  nameBtn.textContent=userName;
};

/* 返信 */
window.startReply=(id)=>{
  const msg=messages.get(id);
  if(!msg)return;

  replyingTo=id;

  replyBar.style.display="block";
  replyBar.innerHTML=`
    返信中: ${msg.name} > ${msg.text.slice(0,20)}
    <span id="cancelReply"
      style="margin-left:10px;padding:2px 6px;background:rgba(255,0,0,.4);border-radius:6px;cursor:pointer;">
      ×キャンセル
    </span>
  `;

  setTimeout(()=>{
    document.getElementById("cancelReply").onclick=()=>{
      replyingTo=null;
      replyBar.style.display="none";
    };
  },0);
};

/* ===== 削除（完全安定版） ===== */
window.deleteMsg = async (id, uidMsg) => {
  if (uid !== uidMsg && uid !== ADMIN_UID) return;

  // Firebase削除
  await remove(ref(db, "chat/" + id));

  messages.delete(id);

  // スレッドから安全削除
  for (const [rootId, list] of threads.entries()) {

    const exists = list.find(m => m.id === id);
    if (!exists) continue;

    // 親 or 子判定
    if (rootId === id) {
      // スレッド丸ごと削除
      for (const m of list) {
        await remove(ref(db, "chat/" + m.id));
        messages.delete(m.id);
      }
      threads.delete(rootId);
    } else {
      // 単体削除
      const newList = list.filter(m => m.id !== id);

      if (newList.length === 0) {
        threads.delete(rootId);
      } else {
        threads.set(rootId, newList);
      }
    }

    break;
  }

  render();
};

/* RENDER */
function render(){
  chatWrap.innerHTML="";

  for(const [rootId,list] of threads.entries()){
    const root=list.find(m=>m.id===rootId);
    if(!root)continue;

    const thread=document.createElement("div");
    thread.className="thread";

    const header=document.createElement("div");
    header.className="threadHeader";

    const btn=document.createElement("div");
    btn.className="collapseBtn";

    const collapsed=collapsedMap.get(rootId)||false;
    btn.textContent=collapsed?"▶":"▼";

    btn.onclick=()=>{
      collapsedMap.set(rootId,!collapsed);
      render();
    };

    header.appendChild(btn);
    header.appendChild(createMsg(root));
    thread.appendChild(header);

    if(!collapsed){
      list.filter(m=>m.id!==rootId).forEach(child=>{
        thread.appendChild(createChild(child));
      });
    }

    chatWrap.prepend(thread);
  }
}

/* MESSAGE */
function createMsg(d){
  const mine=d.uid===uid;

  const div=document.createElement("div");
  div.className="msg "+(mine?"me":"other");

  div.innerHTML=`
    <b class="${mine?'mine-name':'other-name'}">${d.name}</b>
    <div>${d.text}</div>
  `;

  const rbtn=document.createElement("div");
  rbtn.className="replyBtn";
  rbtn.textContent="↩";
  rbtn.onclick=()=>startReply(d.id);
  div.appendChild(rbtn);

  const del=document.createElement("div");
  del.className="delBtn";
  del.textContent="✖";
  del.onclick=()=>deleteMsg(d.id,d.uid);
  div.appendChild(del);

  return div;
}

/* CHILD */
function createChild(d){
  const div=document.createElement("div");
  div.className="replyChild "+(d.uid===uid?"me":"other");
  div.innerHTML=`${d.name}: ${d.text}`;
  return div;
}

/* FIREBASE */
onChildAdded(chatRef,snap=>{
  const d=snap.val();
  const id=snap.key;
  d.id=id;

  messages.set(id,d);

  const root=d.replyTo || id;

  if(!threads.has(root)) threads.set(root,[]);
  threads.get(root).push(d);

  render();
});

/* SEND */
async function send(){
  const t=msgInput.value.trim();
  if(!t)return;

  await push(ref(db,"chat"),{
    uid,
    name:userName,
    text:t,
    time:Date.now(),
    replyTo:replyingTo
  });

  msgInput.value="";
  replyingTo=null;
  replyBar.style.display="none";
}

sendBtn.onclick=send;
msgInput.onkeydown=e=>e.key==="Enter"&&send();

}

</script>

</body>
</html>
