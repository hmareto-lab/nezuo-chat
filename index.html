<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>NEZUO CHAT KING MODE</title>

<style>

html,body{
  margin:0;
  height:100%;
  overflow:hidden;
  background:linear-gradient(135deg,#d7dde5,#b8c2cf);
  font-family:-apple-system,BlinkMacSystemFont,sans-serif;
}

/* HEADER */
#header{
  position:fixed;
  top:0;
  left:0;
  right:0;
  z-index:9000;
  padding:calc(env(safe-area-inset-top) + 10px) 10px 10px;
  display:flex;
  gap:8px;
  background:rgba(255,255,255,.14);
  border-bottom:1px solid rgba(255,255,255,.25);
  backdrop-filter:blur(14px);
}

#msgInput{
  flex:1;
  height:42px;
  border:none;
  outline:none;
  border-radius:12px;
  padding:0 12px;
  background:rgba(255,255,255,.64);
  font-size:15px;
}

button{
  border:none;
  border-radius:12px;
  color:#fff;
  font-weight:700;
  cursor:pointer;
}

#sendBtn{
  width:70px;
  height:42px;
  background:rgba(40,48,58,.84);
  font-size:14px;
}

/* CHAT */
#chatWrap{
  position:fixed;
  top:68px;
  bottom:84px;
  left:0;
  right:0;
  overflow-y:auto;
  padding:14px;
  display:flex;
  flex-direction:column;
  gap:10px;
}

.msg{
  max-width:78%;
  padding:10px 12px;
  border-radius:18px;
  word-break:break-word;
  position:relative;
  box-shadow:0 4px 18px rgba(0,0,0,.08);
}

.me{
  align-self:flex-end;
  background:rgba(40,48,58,.78);
  color:#fff;
}

.other{
  align-self:flex-start;
  background:rgba(255,255,255,.62);
  color:#111;
}

/* =========================
   ★ 名前強調UI（黒白設計）
========================= */

/* 名前ベース */
.msg b{
  display:flex;
  gap:6px;
  margin-bottom:4px;
  font-size:13px;
  font-weight:700;
  color:#fff;
  text-shadow:0 1px 2px rgba(0,0,0,.35);
}

/* 自分はさらに強調 */
.me b{
  font-weight:800;
  color:#ffffff;
}

/* 他人は少し落ち着かせる */
.other b{
  color:#111;
  text-shadow:0 1px 1px rgba(255,255,255,.3);
}

/* 管理者（反転スタイル） */
.msg b.admin{
  color:#000;
  background:#fff;
  padding:2px 6px;
  border-radius:8px;
  font-weight:900;
  text-shadow:none;
}

/* #コード（補助情報） */
.tag{
  font-size:10px;
  opacity:0.45;
  letter-spacing:1.2px;
}

/* 削除ボタン */
.delBtn{
  position:absolute;
  top:6px;
  right:6px;
  width:26px;
  height:26px;
  border-radius:999px;
  background:rgba(255,0,0,.15);
  color:#ff4d4d;
  font-size:14px;
}

/* FOOTER */
#footer{
  position:fixed;
  left:0;
  right:0;
  bottom:0;
  padding:calc(env(safe-area-inset-bottom) + 10px) 10px 10px;
  display:grid;
  grid-template-columns:44px 44px 1fr auto;
  gap:12px;
  background:rgba(255,255,255,.14);
  border-top:1px solid rgba(255,255,255,.25);
  backdrop-filter:blur(14px);
  align-items:center;
}

#upBtn,#downBtn{
  height:44px;
  width:44px;
  border-radius:14px;
  background:rgba(40,48,58,.78);
  font-size:14px;
  display:flex;
  align-items:center;
  justify-content:center;
}

#nameBtn{
  height:44px;
  min-width:44px;
  max-width:160px;
  padding:0 10px;
  border-radius:14px;
  background:rgba(40,48,58,.78);
  font-size:13px;
  display:flex;
  align-items:center;
  justify-content:center;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}

/* send */
#sendBtn{
  width:70px;
  height:42px;
  border-radius:12px;
}

/* link */
a{ color:#3b82f6; }

</style>
</head>

<body>

<div id="app">

  <div id="header">
    <input id="msgInput" placeholder="メッセージ" />
    <button id="sendBtn">送信</button>
  </div>

  <div id="chatWrap"></div>

  <div id="footer">
    <button id="upBtn">↑</button>
    <button id="downBtn">↓</button>
    <div></div>
    <button id="nameBtn">名前</button>
  </div>

</div>

<script type="module">

let started = false;
window.addEventListener("load", startChat);

async function startChat(){

  if(started) return;
  started = true;

  const { initializeApp } =
  await import("https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js");

  const {
    getDatabase,
    ref,
    push,
    onChildAdded,
    query,
    limitToLast,
    remove
  } = await import("https://www.gstatic.com/firebasejs/9.23.0/firebase-database.js");

  const app = initializeApp({
    apiKey:"AIzaSyApju_6KuGq8EkXQPI0aTOysFmZ22vL5HQ",
    authDomain:"nezubo2.firebaseapp.com",
    databaseURL:"https://nezubo2-default-rtdb.firebaseio.com",
    projectId:"nezubo2"
  });

  const db = getDatabase(app);
  const chatRef = query(ref(db,"chat"), limitToLast(80));

  let uid = localStorage.getItem("uid");
  if(!uid){
    uid = crypto.randomUUID();
    localStorage.setItem("uid",uid);
  }

  let userName = localStorage.getItem("userName") || "名無し";

  /* =========================
     管理者UID
  ========================= */
  const ADMIN_UIDS = [
    "eobk3m5b",
    "6ee437db-57db-43f2-8bfd-40193e9d5b3c"
  ];

  function isAdmin(u){
    return ADMIN_UIDS.includes(u);
  }

  const chatWrap = document.getElementById("chatWrap");
  const msgInput = document.getElementById("msgInput");
  const sendBtn = document.getElementById("sendBtn");
  const nameBtn = document.getElementById("nameBtn");
  const upBtn = document.getElementById("upBtn");
  const downBtn = document.getElementById("downBtn");

  function makeShortCode(uid){
    let hash = 0;
    for(let i = 0; i < uid.length; i++){
      hash = (hash * 31 + uid.charCodeAt(i)) >>> 0;
    }
    return hash.toString(36).toUpperCase().slice(0,4);
  }

  function changeName(){
    const n = prompt("名前変更");
    if(!n) return;

    userName = n.trim();
    localStorage.setItem("userName",userName);

    updateName();
  }

  function updateName(){
    const code = makeShortCode(uid);
    const base = isAdmin(uid) ? "👑 " : "";
    const full = `${base}${userName} #${code}`;

    nameBtn.textContent = full;

    if(full.length <= 10){
      nameBtn.style.fontSize = "14px";
    } else if(full.length <= 14){
      nameBtn.style.fontSize = "13px";
    } else {
      nameBtn.style.fontSize = "12px";
    }
  }

  updateName();

  async function send(){
    const t = msgInput.value.trim();
    if(!t) return;

    await push(ref(db,"chat"),{
      uid,
      name:userName,
      text:t,
      time:Date.now()
    });

    msgInput.value = "";
  }

  function canDelete(messageUid){
    return isAdmin(uid) || uid === messageUid;
  }

  function renderText(text){

    const yt = text.match(/(?:https?:\/\/)?(?:www\.)?(?:youtube\.com\/watch\?v=|youtu\.be\/)([a-zA-Z0-9_-]+)/);
    if(yt){
      return `<iframe src="https://www.youtube.com/embed/${yt[1]}" frameborder="0" allowfullscreen></iframe>`;
    }

    const img = text.match(/(https?:\/\/.*\.(jpg|jpeg|png|gif|webp))/i);
    if(img){
      return `<img src="${img[1]}">`;
    }

    return text.replace(/(https?:\/\/[^\s]+)/g,url=>{
      return `<a href="${url}" target="_blank">${url}</a>`;
    });
  }

  function createMsg(d,id){

    const div = document.createElement("div");
    const mine = d.uid === uid;

    div.className = mine ? "msg me" : "msg other";

    const adminClass = isAdmin(d.uid) ? "admin" : "";

    div.innerHTML = `
      <b class="${adminClass}">
        ${isAdmin(d.uid) ? "👑 " : ""}
        ${d.name} #${makeShortCode(d.uid)}
      </b>
      <div>${renderText(d.text)}</div>
    `;

    if(canDelete(d.uid)){
      const del = document.createElement("button");
      del.className = "delBtn";
      del.textContent = "×";

      del.onclick = async ()=>{
        if(!confirm("削除する？")) return;
        await remove(ref(db,"chat/" + id));
        div.remove();
      };

      div.appendChild(del);
    }

    chatWrap.prepend(div);
  }

  onChildAdded(chatRef,(snap)=>{
    createMsg(snap.val(), snap.key);
  });

  upBtn.onclick = ()=> chatWrap.scrollTo({top:0,behavior:"smooth"});
  downBtn.onclick = ()=> chatWrap.scrollTo({top:chatWrap.scrollHeight,behavior:"smooth"});

  sendBtn.onclick = send;
  nameBtn.onclick = changeName;

  msgInput.onkeydown = (e)=>{
    if(e.key==="Enter"){
      e.preventDefault();
      send();
    }
  };

}

</script>

</body>
</html>
