<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">

<title>NEZUO CHAT</title>

<style>

html,body{
  margin:0;
  height:100%;
  overflow:hidden;
  font-family:-apple-system,BlinkMacSystemFont,sans-serif;
  background:linear-gradient(135deg,#d7dde5,#b8c2cf);
}

/* HEADER */
#header{
  position:fixed;
  top:0;left:0;right:0;
  z-index:9999;
  padding:calc(env(safe-area-inset-top) + 10px) 10px 10px;
  display:flex;
  flex-direction:column;
  gap:8px;
  background:rgba(255,255,255,.15);
  border-bottom:1px solid rgba(255,255,255,.25);
  backdrop-filter:blur(14px);
}

#replyBar{
  display:none;
  align-items:center;
  justify-content:space-between;
  gap:8px;
  padding:6px 10px;
  border-radius:10px;
  background:rgba(0,0,0,.35);
  color:#fff;
  font-size:12px;
}

#msgInputWrap{
  display:flex;
  gap:8px;
}

#msgInput{
  flex:1;
  height:42px;
  border:none;
  outline:none;
  border-radius:12px;
  padding:0 12px;
  background:rgba(255,255,255,.72);
  font-size:15px;
}

button{
  border:none;
  border-radius:12px;
  color:#fff;
  font-weight:700;
}

#sendBtn{width:72px;background:rgba(0,120,255,.55);}
#nameBtn{height:44px;background:rgba(0,120,255,.55);}
#uidBtn,#upBtn,#downBtn{height:44px;background:rgba(40,48,58,.85);}

/* CHAT */
#chatWrap{
  position:fixed;
  top:102px;
  bottom:84px;
  left:0;right:0;
  overflow-y:auto;
  padding:14px;
  display:flex;
  flex-direction:column;
  gap:18px;
}

.thread{
  border-left:2px solid rgba(0,0,0,.15);
  padding-left:10px;
}

/* ★★★ここが修正ポイント★★★ */
.msg{
  position:relative;
  max-width:78%;
  padding:10px 44px 12px 12px; /* ←返信・削除ボタンの逃げ場 */
  border-radius:18px;
  word-break:break-word;
  box-shadow:0 4px 18px rgba(0,0,0,.08);
}

.replyChild{
  margin-left:24px;
  margin-top:10px;
  padding:8px 10px;
  border-radius:14px;
  background:rgba(255,255,255,.6);
  border-left:2px solid rgba(0,0,0,.12);
  position:relative;
}

.me{background:rgba(40,48,58,.82);color:#fff;}
.other{background:rgba(255,255,255,.72);color:#111;}

.replyBtn,.delBtn{
  position:absolute;
  width:22px;height:22px;
  border-radius:6px;
  display:flex;
  align-items:center;
  justify-content:center;
  color:#fff;
  font-size:12px;
  font-weight:900;
}

.replyBtn{right:34px;bottom:6px;background:rgba(0,120,255,.55);}
.delBtn{right:6px;top:6px;background:rgba(255,0,0,.7);}

.childDelBtn{
  position:absolute;
  right:6px;
  top:6px;
  width:22px;height:22px;
  border-radius:6px;
  background:rgba(255,0,0,.75);
  display:flex;
  align-items:center;
  justify-content:center;
  color:#fff;
  font-weight:900;
  font-size:12px;
}

.collapseBtn{
  width:24px;height:24px;
  border-radius:6px;
  background:rgba(0,0,0,.25);
  color:#fff;
  display:flex;
  align-items:center;
  justify-content:center;
}

/* FOOTER */
#footer{
  position:fixed;
  left:0;right:0;bottom:0;
  padding:calc(env(safe-area-inset-bottom) + 10px) 10px 10px;
  display:grid;
  grid-template-columns:44px 44px 44px 1fr auto;
  gap:12px;
  background:rgba(255,255,255,.15);
  border-top:1px solid rgba(255,255,255,.25);
  backdrop-filter:blur(14px);
}

/* modal */
#modal,#uidPanel{
  position:fixed;
  inset:0;
  display:none;
  align-items:center;
  justify-content:center;
  background:rgba(0,0,0,.85);
  z-index:99999;
}

#modal img{max-width:90%;max-height:90%;border-radius:12px;}

#uidBox{
  background:#fff;
  padding:16px;
  border-radius:12px;
  width:85%;
  max-width:360px;
}

.btn-copy{background:rgba(0,120,255,.55)!important;}
.btn-danger{background:rgba(255,0,0,.65)!important;}

</style>
</head>

<body>

<div id="header">
  <div id="replyBar"></div>
  <div id="msgInputWrap">
    <input id="msgInput" placeholder="メッセージ">
    <button id="sendBtn">送信</button>
  </div>
</div>

<div id="chatWrap"></div>

<div id="footer">
  <button id="upBtn">↑</button>
  <button id="downBtn">↓</button>
  <button id="uidBtn">UID</button>
  <div></div>
  <button id="nameBtn"></button>
</div>

<div id="modal" onclick="this.style.display='none'">
  <img id="modalImg">
</div>

<div id="uidPanel" onclick="this.style.display='none'">
  <div id="uidBox" onclick="event.stopPropagation()">
    <div id="uidInfo"></div>
    <button id="copyBtn" class="btn-copy">UIDコピー</button>
    <button class="btn-danger" onclick="uidPanel.style.display='none'">閉じる</button>
  </div>
</div>

<script type="module">

import {initializeApp} from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
import {getDatabase,ref,push,remove,onValue,query,limitToLast}
from "https://www.gstatic.com/firebasejs/9.23.0/firebase-database.js";

const app=initializeApp({
  apiKey:"AIzaSyApju_6KuGq8EkXQPI0aTOysFmZ22vL5HQ",
  authDomain:"nezubo2.firebaseapp.com",
  databaseURL:"https://nezubo2-default-rtdb.firebaseio.com",
  projectId:"nezubo2"
});

const db=getDatabase(app);
const chatRef=query(ref(db,"chat"),limitToLast(80));

const ADMIN_UIDS=["eobk3m5b","6ee437db-57db-43f2-8bfd-40193e9d5b3c"];

let uid=localStorage.getItem("fixed_uid")||crypto.randomUUID();
localStorage.setItem("fixed_uid",uid);

let userName=localStorage.getItem("userName")||"名無し";
let replyingTo=null;

const chatWrap=document.getElementById("chatWrap");
const msgInput=document.getElementById("msgInput");
const replyBar=document.getElementById("replyBar");
const copyBtn=document.getElementById("copyBtn");

/* UID COPY */
copyBtn.onclick = async () => {
  try {
    await navigator.clipboard.writeText(uid);
  } catch {
    const ta=document.createElement("textarea");
    ta.value=uid;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand("copy");
    ta.remove();
  }
  copyBtn.textContent="コピー完了";
  setTimeout(()=>copyBtn.textContent="UIDコピー",1000);
};

/* NAME */
function makeCode(u){
  let h=0;
  for(let i=0;i<u.length;i++)h=(h*31+u.charCodeAt(i))>>>0;
  return "#"+h.toString(16).slice(0,4).toUpperCase();
}

function updateName(){
  nameBtn.textContent=(ADMIN_UIDS.includes(uid)?"👑 ":"")+userName+" "+makeCode(uid);
}
updateName();

nameBtn.onclick=()=>{
  const n=prompt("名前変更",userName);
  if(!n)return;
  userName=n;
  localStorage.setItem("userName",n);
  updateName();
};

/* UID PANEL */
uidBtn.onclick=()=>{
  document.getElementById("uidInfo").innerHTML=
  `UID:<br>${uid}<br><br>CODE:<br>${makeCode(uid)}<br><br>ADMIN:${ADMIN_UIDS.includes(uid)}`;
  document.getElementById("uidPanel").style.display="flex";
};

/* REPLY */
window.startReply=(id,name)=>{
  replyingTo=id;
  replyBar.style.display="flex";
  replyBar.innerHTML=`返信: ${name}
  <button class="btn-danger" onclick="cancelReply()">キャンセル</button>`;
};

window.cancelReply=()=>{
  replyingTo=null;
  replyBar.style.display="none";
};

/* CONTENT */
function escapeHtml(str){
  return str
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;")
    .replaceAll('"',"&quot;")
    .replaceAll("'","&#039;");
}

function isImage(url){
  return /\.(jpg|jpeg|png|gif|webp)$/i.test(url);
}

function getYouTubeId(url){
  const m =
    url.match(/youtu\.be\/([a-zA-Z0-9_-]+)/) ||
    url.match(/v=([a-zA-Z0-9_-]+)/);
  return m ? m[1] : null;
}

window.openImage=(url)=>{
  document.getElementById("modalImg").src=url;
  document.getElementById("modal").style.display="flex";
};

function renderContent(text){
  let safe=escapeHtml(text);
  const urlRegex=/(https?:\/\/[^\s]+)/g;

  return safe.replace(urlRegex,(url)=>{

    const yt=getYouTubeId(url);
    if(yt){
      return `
        <div style="margin-top:6px">
          <a href="${url}" target="_blank">
            <img src="https://img.youtube.com/vi/${yt}/hqdefault.jpg"
              style="max-width:220px;border-radius:10px;cursor:pointer">
          </a>
        </div>
      `;
    }

    if(isImage(url)){
      return `
        <div style="margin-top:6px">
          <img src="${url}"
            onclick="openImage('${url}')"
            style="max-width:220px;border-radius:10px;cursor:pointer">
        </div>
      `;
    }

    return `<a href="${url}" target="_blank" style="color:#1a73e8">${url}</a>`;
  });
}

/* MESSAGE */
function msg(m,isChild=false){
  const mine=m.uid===uid;

  const div=document.createElement("div");
  div.dataset.id=m.id;
  div.className=isChild?"replyChild":"msg "+(mine?"me":"other");

  div.innerHTML=`
    <b>${m.name}</b>
    <div>${renderContent(m.text)}</div>
  `;

  if(!isChild){
    const r=document.createElement("div");
    r.className="replyBtn";
    r.textContent="↩";
    r.onclick=()=>startReply(m.id,m.name);
    div.appendChild(r);
  }

  if(m.uid===uid || ADMIN_UIDS.includes(uid)){
    const d=document.createElement("div");
    d.className=isChild?"childDelBtn":"delBtn";
    d.textContent="✖";
    d.onclick=()=>remove(ref(db,"chat/"+m.id));
    div.appendChild(d);
  }

  return div;
}

/* DRAW */
function draw(data){
  chatWrap.innerHTML="";

  const arr=Object.entries(data||{}).map(([id,v])=>({id,...v}));

  const roots=arr.filter(m=>!m.replyTo).sort((a,b)=>b.time-a.time);

  roots.forEach(root=>{
    const thread=document.createElement("div");
    thread.className="thread";

    const header=document.createElement("div");

    const btn=document.createElement("div");
    btn.className="collapseBtn";

    const childrenArr=arr.filter(c=>c.replyTo===root.id);

    const children=document.createElement("div");

    const body=msg(root);

    if(childrenArr.length===0){
      btn.textContent="・";
      btn.style.opacity=".4";
    }else{
      btn.textContent="▶";
      btn.onclick=()=>{
        const open=children.style.display==="block";
        children.style.display=open?"none":"block";
        btn.textContent=open?"▶":"▼";
      };
    }

    childrenArr.forEach(c=>children.appendChild(msg(c,true)));

    header.appendChild(btn);
    header.appendChild(body);

    thread.appendChild(header);
    thread.appendChild(children);

    chatWrap.appendChild(thread);
  });
}

onValue(chatRef,s=>draw(s.val()));

/* SEND */
sendBtn.onclick=async()=>{
  const t=msgInput.value.trim();
  if(!t)return;

  const p=await push(ref(db,"chat"),{
    uid,
    name:userName,
    text:t,
    time:Date.now(),
    replyTo:replyingTo||null
  });

  const id=p.key;

  msgInput.value="";
  cancelReply();

  setTimeout(()=>{
    const el=document.querySelector(`[data-id="${id}"]`);
    if(el)el.scrollIntoView({behavior:"smooth",block:"center"});
  },400);
};

upBtn.onclick=()=>chatWrap.scrollTo({top:0,behavior:"smooth"});
downBtn.onclick=()=>chatWrap.scrollTo({top:chatWrap.scrollHeight,behavior:"smooth"});

msgInput.onkeydown=e=>{
  if(e.key==="Enter"){
    e.preventDefault();
    sendBtn.onclick();
  }
};

</script>

</body>
</html>
