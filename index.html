<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>NEZUO CHAT KING MODE</title>

<style>

html,body{
  margin:0;
  height:100%;
  overflow:hidden;
  background:linear-gradient(135deg,#d7dde5,#b8c2cf);
  font-family:-apple-system,BlinkMacSystemFont,sans-serif;
}

/* HEADER */
#header{
  position:fixed;
  top:0;
  left:0;
  right:0;
  z-index:9000;
  padding:calc(env(safe-area-inset-top) + 10px) 10px 10px;
  display:flex;
  gap:8px;
  background:rgba(255,255,255,.14);
  border-bottom:1px solid rgba(255,255,255,.25);
  backdrop-filter:blur(14px);
}

#msgInput{
  flex:1;
  height:42px;
  border:none;
  outline:none;
  border-radius:12px;
  padding:0 12px;
  background:rgba(255,255,255,.64);
  font-size:15px;
}

button{
  border:none;
  border-radius:12px;
  color:#fff;
  font-weight:700;
  cursor:pointer;
}

#sendBtn{
  width:70px;
  height:42px;
  background:rgba(40,48,58,.84);
}

/* CHAT */
#chatWrap{
  position:fixed;
  top:68px;
  bottom:84px;
  left:0;
  right:0;
  overflow-y:auto;
  padding:14px;
  display:flex;
  flex-direction:column;
  gap:10px;
}

.msg{
  max-width:78%;
  padding:10px 12px 12px 12px;
  border-radius:18px;
  word-break:break-word;
  position:relative;
  box-shadow:0 4px 18px rgba(0,0,0,.08);
}

.me{
  align-self:flex-end;
  background:rgba(40,48,58,.78);
  color:#fff;
}

.other{
  align-self:flex-start;
  background:rgba(255,255,255,.62);
  color:#111;
}

/* 名前 */
.msg b{
  display:flex;
  align-items:center;
  gap:6px;
  margin-bottom:4px;
  font-size:13px;
  font-weight:700;
  padding-right:28px; /* ←削除ボタンと絶対被らない余白 */
}

.mine-name{
  background:#000;
  color:#fff;
  padding:2px 8px;
  border-radius:8px;
}

.other-name{
  background:#fff;
  color:#000;
  padding:2px 8px;
  border-radius:8px;
  border:1px solid #000;
}

/* 管理者 */
.admin-mark{
  color:gold;
  font-weight:900;
}

/* ===== 削除ボタン（改善版） ===== */
.delBtn{
  position:absolute;
  top:6px;
  right:6px;

  width:22px;
  height:22px;

  border-radius:6px;

  background:rgba(255,0,0,0.45); /* 赤半透明 */
  color:#fff;

  font-size:14px;
  font-weight:900;

  display:flex;
  align-items:center;
  justify-content:center;

  cursor:pointer;

  border:1px solid rgba(255,255,255,0.3);

  transition:0.15s ease;
}

.delBtn:hover{
  background:rgba(255,0,0,0.7);
  transform:scale(1.1);
}

/* FOOTER */
#footer{
  position:fixed;
  left:0;
  right:0;
  bottom:0;
  padding:calc(env(safe-area-inset-bottom) + 10px) 10px 10px;
  display:grid;
  grid-template-columns:44px 44px 1fr auto;
  gap:12px;
  background:rgba(255,255,255,.14);
  border-top:1px solid rgba(255,255,255,.25);
  backdrop-filter:blur(14px);
  align-items:center;
}

#upBtn,#downBtn,#nameBtn{
  height:44px;
  border-radius:14px;
  background:rgba(40,48,58,.78);
}

/* MEDIA */
.media-box{
  width:100%;
  margin-top:6px;
  border-radius:12px;
  overflow:hidden;
}

.chat-img{
  width:100%;
  max-height:260px;
  object-fit:cover;
  display:block;
  border-radius:12px;
  cursor:pointer;
}

.yt-thumb{
  position:relative;
  width:100%;
  aspect-ratio:16/9;
  border-radius:12px;
  overflow:hidden;
  margin-top:6px;
  cursor:pointer;
  background:#000;
}

.yt-thumb img{
  width:100%;
  height:100%;
  object-fit:cover;
  filter:brightness(.85);
}

.yt-play{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  width:60px;
  height:60px;
  border-radius:50%;
  background:rgba(0,0,0,.6);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:22px;
  color:#fff;
}

</style>
</head>

<body>

<div id="header">
  <input id="msgInput" placeholder="メッセージ" />
  <button id="sendBtn">送信</button>
</div>

<div id="chatWrap"></div>

<div id="footer">
  <button id="upBtn">↑</button>
  <button id="downBtn">↓</button>
  <div></div>
  <button id="nameBtn">名前</button>
</div>

<script type="module">

let started=false;
window.addEventListener("load",startChat);

async function startChat(){
if(started)return;
started=true;

const { initializeApp } =
await import("https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js");

const {
  getDatabase,
  ref,
  push,
  onChildAdded,
  onChildRemoved,
  query,
  limitToLast,
  remove
} = await import("https://www.gstatic.com/firebasejs/9.23.0/firebase-database.js");

const app = initializeApp({
  apiKey:"AIzaSyApju_6KuGq8EkXQPI0aTOysFmZ22vL5HQ",
  authDomain:"nezubo2.firebaseapp.com",
  databaseURL:"https://nezubo2-default-rtdb.firebaseio.com",
  projectId:"nezubo2"
});

const db=getDatabase(app);
const chatRef=query(ref(db,"chat"),limitToLast(80));

const ADMIN_UID="eobk3m5b";

let uid=localStorage.getItem("uid")||crypto.randomUUID();
localStorage.setItem("uid",uid);

let userName=localStorage.getItem("userName")||"名無し";

const chatWrap=document.getElementById("chatWrap");
const msgInput=document.getElementById("msgInput");
const sendBtn=document.getElementById("sendBtn");
const nameBtn=document.getElementById("nameBtn");

nameBtn.textContent=userName;

/* メッセージ管理 */
const msgElements=new Map();

/* 名前変更 */
nameBtn.onclick=()=>{
  const n=prompt("名前変更",userName);
  if(!n)return;
  userName=n.slice(0,20);
  localStorage.setItem("userName",userName);
  nameBtn.textContent=userName;
};

/* 削除 */
window.deleteMsg=async(id,msgUid)=>{
  if(uid!==msgUid && uid!==ADMIN_UID) return;
  await remove(ref(db,"chat/"+id));
};

/* 名前短縮 */
function makeShort(u){
  let h=0;
  for(let i=0;i<u.length;i++)h=(h*31+u.charCodeAt(i))>>>0;
  return h.toString(36).slice(0,4).toUpperCase();
}

/* メッセージ作成 */
function createMsg(d,id){

  const mine=d.uid===uid;
  const isAdmin=d.uid===ADMIN_UID;

  const div=document.createElement("div");
  div.className=mine?"msg me":"msg other";

  const nameClass=mine?"mine-name":"other-name";

  div.innerHTML=`
    <b class="${nameClass}">
      ${isAdmin?"👑 ":""}${d.name} #${makeShort(d.uid)}
    </b>
    <div>${d.text}</div>
  `;

  const del=document.createElement("button");
  del.className="delBtn";
  del.textContent="✖";

  del.onclick=()=>deleteMsg(id,d.uid);

  div.appendChild(del);

  chatWrap.prepend(div);
  msgElements.set(id,div);
}

/* 受信 */
onChildAdded(chatRef,snap=>{
  createMsg(snap.val(),snap.key);
});

/* 削除同期 */
onChildRemoved(ref(db,"chat"),snap=>{
  const id=snap.key;
  const el=msgElements.get(id);

  if(el){
    el.style.opacity="0";
    el.style.transform="translateX(20px)";
    setTimeout(()=>{
      el.remove();
      msgElements.delete(id);
    },200);
  }
});

/* 送信 */
async function send(){
  const t=msgInput.value.trim();
  if(!t)return;

  await push(ref(db,"chat"),{
    uid,
    name:userName,
    text:t,
    time:Date.now()
  });

  msgInput.value="";
}

sendBtn.onclick=send;
msgInput.onkeydown=e=>e.key==="Enter"&&send();

}

</script>

</body>
</html>
