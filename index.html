<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>NEZUO CHAT KING MODE</title>

<style>

html,body{
  margin:0;
  height:100%;
  overflow:hidden;
  background:linear-gradient(135deg,#d7dde5,#b8c2cf);
  font-family:-apple-system,BlinkMacSystemFont,sans-serif;
}

/* HEADER */
#header{
  position:fixed;
  top:0;
  left:0;
  right:0;
  z-index:9000;
  padding:calc(env(safe-area-inset-top) + 10px) 10px 10px;
  display:flex;
  gap:8px;
  background:rgba(255,255,255,.14);
  border-bottom:1px solid rgba(255,255,255,.25);
  backdrop-filter:blur(14px);
}

#msgInput{
  flex:1;
  height:42px;
  border:none;
  outline:none;
  border-radius:12px;
  padding:0 12px;
  background:rgba(255,255,255,.64);
  font-size:15px;
}

button{
  border:none;
  border-radius:12px;
  color:#fff;
  font-weight:700;
  cursor:pointer;
}

#sendBtn{
  width:70px;
  height:42px;
  background:rgba(40,48,58,.84);
  font-size:14px;
}

/* CHAT */
#chatWrap{
  position:fixed;
  top:68px;
  bottom:84px;
  left:0;
  right:0;
  overflow-y:auto;
  padding:14px;
  display:flex;
  flex-direction:column;
  gap:10px;
}

.msg{
  max-width:78%;
  padding:10px 12px;
  border-radius:18px;
  word-break:break-word;
  position:relative;
  box-shadow:0 4px 18px rgba(0,0,0,.08);
}

.me{
  align-self:flex-end;
  background:rgba(40,48,58,.78);
  color:#fff;
}

.other{
  align-self:flex-start;
  background:rgba(255,255,255,.62);
  color:#111;
}

/* 名前 */
.msg b{
  display:flex;
  gap:6px;
  margin-bottom:4px;
  font-size:13px;
  font-weight:700;
}

.mine-name{
  background:#000 !important;
  color:#fff !important;
  padding:2px 8px;
  border-radius:8px;
}

.other-name{
  background:#fff !important;
  color:#000 !important;
  padding:2px 8px;
  border-radius:8px;
  border:1px solid #000;
}

/* 画像＆動画 */
.chat-img{
  max-width:100%;
  border-radius:12px;
  margin-top:6px;
  display:block;
}

.video-wrap{
  position:relative;
  width:100%;
  padding-top:56.25%;
  margin-top:8px;
}

.video-wrap iframe{
  position:absolute;
  top:0;
  left:0;
  width:100%;
  height:100%;
  border-radius:12px;
}

/* FOOTER */
#footer{
  position:fixed;
  left:0;
  right:0;
  bottom:0;
  padding:calc(env(safe-area-inset-bottom) + 10px) 10px 10px;
  display:grid;
  grid-template-columns:44px 44px 1fr auto;
  gap:12px;
  background:rgba(255,255,255,.14);
  border-top:1px solid rgba(255,255,255,.25);
  backdrop-filter:blur(14px);
  align-items:center;
}

#upBtn,#downBtn{
  height:44px;
  width:44px;
  border-radius:14px;
  background:rgba(40,48,58,.78);
}

#nameBtn{
  height:44px;
  border-radius:14px;
  background:rgba(40,48,58,.78);
  font-size:13px;
  padding:0 10px;
}

</style>
</head>

<body>

<div id="header">
  <input id="msgInput" placeholder="メッセージ" />
  <button id="sendBtn">送信</button>
</div>

<div id="chatWrap"></div>

<div id="footer">
  <button id="upBtn">↑</button>
  <button id="downBtn">↓</button>
  <div></div>
  <button id="nameBtn">名前</button>
</div>

<script type="module">

let started = false;
window.addEventListener("load", startChat);

async function startChat(){

if(started) return;
started = true;

const { initializeApp } =
await import("https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js");

const {
  getDatabase,
  ref,
  push,
  onChildAdded,
  query,
  limitToLast
} = await import("https://www.gstatic.com/firebasejs/9.23.0/firebase-database.js");

const app = initializeApp({
  apiKey:"AIzaSyApju_6KuGq8EkXQPI0aTOysFmZ22vL5HQ",
  authDomain:"nezubo2.firebaseapp.com",
  databaseURL:"https://nezubo2-default-rtdb.firebaseio.com",
  projectId:"nezubo2"
});

const db = getDatabase(app);
const chatRef = query(ref(db,"chat"), limitToLast(80));

let uid = localStorage.getItem("uid");
if(!uid){
  uid = crypto.randomUUID();
  localStorage.setItem("uid",uid);
}

let userName = localStorage.getItem("userName") || "名無し";

const chatWrap = document.getElementById("chatWrap");
const msgInput = document.getElementById("msgInput");
const sendBtn = document.getElementById("sendBtn");
const nameBtn = document.getElementById("nameBtn");

/* 名前変更ボタン（修正ポイント） */
nameBtn.onclick = () => {
  const newName = prompt("新しい名前を入力", userName);
  if(!newName) return;

  userName = newName.trim().slice(0,20);
  localStorage.setItem("userName", userName);

  nameBtn.textContent = userName;
};

/* 初期表示 */
nameBtn.textContent = userName;

/* uid短縮コード */
function makeShortCode(uid){
  let h=0;
  for(let i=0;i<uid.length;i++){
    h=(h*31+uid.charCodeAt(i))>>>0;
  }
  return h.toString(36).toUpperCase().slice(0,4);
}

/* メディア変換 */
function renderText(text){

  let html = text.replace(/(https?:\/\/[^\s]+)/g, url => {

    if(url.match(/\.(png|jpg|jpeg|gif|webp)$/i)){
      return `<img class="chat-img" src="${url}">`;
    }

    if(url.includes("youtube.com") || url.includes("youtu.be")){
      const id = url.split("v=")[1]?.slice(0,11) || url.split("/").pop();
      return `
        <div class="video-wrap">
          <iframe src="https://www.youtube.com/embed/${id}" frameborder="0" allowfullscreen></iframe>
        </div>
      `;
    }

    return `<a href="${url}" target="_blank">${url}</a>`;
  });

  return html;
}

/* メッセージ描画 */
function createMsg(d){

  const div = document.createElement("div");
  const mine = d.uid === uid;

  div.className = mine ? "msg me" : "msg other";

  const nameClass = mine ? "mine-name" : "other-name";

  div.innerHTML = `
    <b class="${nameClass}">
      ${d.name} #${makeShortCode(d.uid)}
    </b>
    <div>${renderText(d.text)}</div>
  `;

  chatWrap.prepend(div);
}

/* Firebase受信 */
onChildAdded(chatRef,(snap)=>{
  createMsg(snap.val());
});

/* 送信 */
async function send(){
  const t = msgInput.value.trim();
  if(!t) return;

  await push(ref(db,"chat"),{
    uid,
    name:userName,
    text:t,
    time:Date.now()
  });

  msgInput.value="";
}

sendBtn.onclick = send;

msgInput.onkeydown = (e)=>{
  if(e.key==="Enter") send();
};

}

</script>

</body>
</html>
