<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>NEZUO CHAT v20 CORE</title>

<style>
html,body{
  margin:0;
  height:100%;
  overflow:hidden;
  background:#e9edf2;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
}

*{ box-sizing:border-box; }

/* =====================
   HEADER（完全固定）
===================== */
#header{
  position:fixed;
  top:0;
  left:0;
  right:0;
  z-index:9999;
  background:#1f2328;
  padding:calc(env(safe-area-inset-top) + 10px) 10px 10px;
  display:flex;
  gap:8px;
}

/* =====================
   FOOTER（完全固定）
===================== */
#footer{
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  z-index:9999;
  background:#1f2328;
  padding:10px 10px calc(10px + env(safe-area-inset-bottom));
  display:grid;
  grid-template-columns:56px 56px 1fr 56px 56px;
  gap:8px;
}

/* =====================
   CHAT（唯一スクロール領域）
===================== */
#chatWrap{
  position:fixed;
  top:72px;
  bottom:72px;
  left:0;
  right:0;

  overflow-y:auto;
  -webkit-overflow-scrolling:touch;

  padding:14px;
  display:flex;
  flex-direction:column;
  gap:10px;
}

/* =====================
   MESSAGE
===================== */
.msg{
  max-width:78%;
  padding:10px 12px;
  border-radius:16px;
  font-size:14px;
  line-height:1.5;
  word-break:break-word;
}

.me{ background:#95ec69; align-self:flex-end; }
.other{ background:#fff; align-self:flex-start; }
.system{ background:#c9ced6; align-self:center; font-size:12px; }

/* =====================
   BUTTON
===================== */
button{
  height:42px;
  min-width:56px;
  border:none;
  border-radius:10px;
  background:#111;
  color:#fff;
  display:flex;
  align-items:center;
  justify-content:center;
}

button:active{ transform:scale(.96); }

/* =====================
   INPUT
===================== */
input{
  width:100%;
  border:none;
  outline:none;
  border-radius:10px;
  padding:11px;
  font-size:15px;
}

/* =====================
   BADGE（既読制御）
===================== */
#newBadge{
  position:fixed;
  bottom:90px;
  left:50%;
  transform:translateX(-50%);
  background:#ff3b30;
  color:#fff;
  font-size:12px;
  padding:6px 10px;
  border-radius:20px;
  opacity:0;
  transition:.15s;
  z-index:10000;
}

/* =====================
   UI
===================== */
.hidden{
  display:none !important;
}
</style>
</head>

<body>

<!-- HEADER -->
<div id="header">
  <input id="nameInput" placeholder="名前" />
  <button id="joinBtn">入室</button>

  <input id="msgInput" placeholder="メッセージ" class="hidden" />
  <button id="sendBtn" class="hidden">送信</button>
</div>

<!-- CHAT -->
<div id="chatWrap"></div>

<!-- FOOTER -->
<div id="footer">
  <button id="followBtn">追従</button>
  <button id="upBtn">↑</button>
  <div style="color:#fff;text-align:center;font-size:13px;font-weight:600;">NEZUO CHAT</div>
  <button id="downBtn">↓</button>
  <button id="exitBtn">退出</button>
</div>

<div id="newBadge">0</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
import {
  getDatabase,
  ref,
  push,
  onChildAdded,
  query,
  orderByChild,
  limitToLast
} from "https://www.gstatic.com/firebasejs/9.23.0/firebase-database.js";

/* =====================
   FIREBASE
===================== */
const app = initializeApp({
  apiKey:"AIzaSyApju_6KuGq8EkXqPI0aTOysFmZ22vL5HQ",
  authDomain:"nezubo2.firebaseapp.com",
  databaseURL:"https://nezubo2-default-rtdb.firebaseio.com",
  projectId:"nezubo2"
});

const db = getDatabase(app);
const chatRef = query(ref(db,"chat"), orderByChild("time"), limitToLast(80));

/* =====================
   STATE
===================== */
let uid = localStorage.getItem("uid") || crypto.randomUUID();
localStorage.setItem("uid", uid);

const state = {
  userName:"",
  autoFollow:true,
  lastSend:0,
  newCount:0,
  isRead:true
};

/* =====================
   DOM
===================== */
const chatWrap=document.getElementById("chatWrap");
const nameInput=document.getElementById("nameInput");
const msgInput=document.getElementById("msgInput");
const joinBtn=document.getElementById("joinBtn");
const sendBtn=document.getElementById("sendBtn");
const followBtn=document.getElementById("followBtn");
const exitBtn=document.getElementById("exitBtn");
const newBadge=document.getElementById("newBadge");

/* =====================
   SCROLL判定
===================== */
function isAtTop(){
  return chatWrap.scrollTop < 10;
}

/* =====================
   既読判定（唯一ルール）
===================== */
function updateReadState(){
  state.isRead = state.autoFollow || isAtTop();

  if(state.isRead){
    state.newCount = 0;
    newBadge.style.opacity = 0;
  }
}

/* =====================
   BADGE
===================== */
function updateBadge(){
  if(state.isRead){
    newBadge.style.opacity = 0;
    return;
  }

  newBadge.style.opacity = 1;
  newBadge.textContent = state.newCount;
}

/* =====================
   UI
===================== */
function syncUI(){
  const inRoom = !!state.userName;

  nameInput.classList.toggle("hidden", inRoom);
  joinBtn.classList.toggle("hidden", inRoom);

  msgInput.classList.toggle("hidden", !inRoom);
  sendBtn.classList.toggle("hidden", !inRoom);

  followBtn.textContent = state.autoFollow ? "追従" : "停止";
}

/* =====================
   SCROLL
===================== */
const goTop=()=>chatWrap.scrollTop=0;

/* =====================
   JOIN
===================== */
function join(){
  const n=nameInput.value.trim();
  if(!n) return;

  state.userName=n;

  push(ref(db,"chat"),{
    uid,
    name:"system",
    text:`${state.userName} 入室`,
    time:Date.now()
  });

  syncUI();
  goTop();
}

joinBtn.onclick=join;

/* ENTER */
document.addEventListener("keydown",(e)=>{
  if(e.key!=="Enter") return;

  if(document.activeElement===nameInput) join();
  if(document.activeElement===msgInput) send();
});

/* =====================
   SEND
===================== */
function send(){
  if(!state.userName) return;

  const t=msgInput.value.trim();
  if(!t) return;

  push(ref(db,"chat"),{
    uid,
    name:state.userName,
    text:t,
    time:Date.now()
  });

  msgInput.value="";
}

sendBtn.onclick=send;

/* =====================
   EXIT
===================== */
exitBtn.onclick=()=>{
  push(ref(db,"chat"),{
    uid,
    name:"system",
    text:`${state.userName} 退出`,
    time:Date.now()
  });

  state.userName="";
  syncUI();
};

/* =====================
   FOLLOW
===================== */
followBtn.onclick=()=>{
  state.autoFollow=!state.autoFollow;
  syncUI();

  if(state.autoFollow){
    state.newCount=0;
    updateBadge();
    goTop();
  }
};

/* =====================
   RECEIVE
===================== */
onChildAdded(chatRef,(snap)=>{

  const d=snap.val();
  const mine=d.uid===uid;

  const div=document.createElement("div");

  if(d.name==="system"){
    div.className="msg system";
    div.textContent=d.text;
  }else if(mine){
    div.className="msg me";
    div.textContent=d.text;
  }else{
    div.className="msg other";
    div.innerHTML=`<b>${d.name}</b><br>${d.text}`;
  }

  chatWrap.prepend(div);

  updateReadState();

  if(!state.isRead){
    state.newCount++;
  }

  updateBadge();

  if(state.autoFollow){
    goTop();
  }
});

/* =====================
   JUMP
===================== */
upBtn.onclick=()=>{
  goTop();
  updateReadState();
};

downBtn.onclick=()=>{
  chatWrap.scrollTop = chatWrap.scrollHeight;
  updateReadState();
};

chatWrap.addEventListener("scroll",()=>{
  updateReadState();
  updateBadge();
});

</script>

</body>
</html>
