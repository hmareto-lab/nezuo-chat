<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
    <title>NEZUO ONETIME CHAT</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <style>
        *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
        :root{ --primary:#007aff; --bg:#f2f4f7; --accent:#28a745; --danger:#d9363e; --dark:#2c3e50; }
        html,body{ margin:0; width:100%; height:100%; overflow:hidden; background:var(--bg); font-family:-apple-system,sans-serif; }
        body{ display:flex; justify-content:center; } 
        #lobby, #mainApp { display:none; }
        
        #mainApp{ flex-direction:column; width:100%; height:100svh; max-width:800px; background:#fff; position:relative; }
        #lobby{ position:fixed; inset:0; justify-content:center; align-items:center; background:linear-gradient(135deg,#f5f7fa,#c3cfe2); z-index:1000; display:flex; }
        .lobby-content{ width:90%; max-width:380px; background:#fff; border-radius:28px; padding:25px; box-shadow:0 20px 40px rgba(0,0,0,.15); display:flex; flex-direction:column; gap:10px; max-height: 95vh; overflow-y: auto; }
        .lobby-input{ width:100%; height:44px; border:1px solid #eee; border-radius:12px; background:#f9fbff; padding:0 15px; font-size:16px; outline:none; }
        
        .policy-box { background:#fff9f0; border:1px solid #ffeeba; border-radius:12px; padding:12px; font-size:11px; line-height:1.4; color:#856404; }
        .policy-box h3 { margin:0 0 5px 0; font-size:12px; color:#d9363e; }
        .security-point { display:flex; gap:5px; margin-bottom:3px; font-weight:bold; color:var(--dark); }

        #header{ background:#fff; border-bottom:1px solid #ececec; padding-top:env(safe-area-inset-top); z-index:10; }
        .app-header-top{ display:flex; align-items:flex-end; gap:8px; padding:12px; }
        textarea{ flex:1; height:42px; min-height:42px; max-height:120px; padding:10px 15px; border:none; outline:none; resize:none; background:#f1f3f5; border-radius:20px; font-size:16px; line-height:1.4; overflow-y:hidden; }
        #sendBtn{ width:70px; height:42px; border:none; border-radius:20px; background:var(--primary); color:#fff; font-weight:800; cursor:pointer; }
        #sendBtn:disabled{ background:#ccc; }
        
        .room-info-bar{ display:flex; justify-content:space-between; align-items:center; padding:6px 12px; border-top:1px solid #f6f6f6; background:#fcfcfc; min-height:35px; }
        .info-item{ background:#f1f1f1; padding:3px 8px; border-radius:5px; font-size:10px; font-weight:700; color:#666; }
        #presenceList { display:flex; gap:5px; overflow-x:auto; }
        .user-chip { background:var(--primary); color:#fff; padding:2px 8px; border-radius:10px; font-size:10px; white-space:nowrap; }

        #chatWrap{ flex:1; overflow-y:auto; padding:15px 12px; background:#f7f8fa; display:flex; flex-direction:column; }
        #list{ display:flex; flex-direction:column-reverse; gap:12px; }
        
        .msg-wrap{ display:flex; flex-direction:column; animation:fadeIn .15s ease; }
        @keyframes fadeIn{ from{opacity:0;transform:translateY(-5px)} to{opacity:1;transform:translateY(0)} }
        .msg{ background:#fff; border-radius:18px; padding:8px 14px; max-width:85%; box-shadow:0 1px 2px rgba(0,0,0,.05); }
        .msg-text{ font-size:15px; line-height:1.5; white-space:pre-wrap; word-break:break-word; }
        .msg-meta{ font-size:10px; color:#999; margin:4px 0 0 8px; }
        .sys-msg{ align-self:center; color:#555; font-size:11px; font-weight:bold; margin:5px 0; background:#e9ecef; padding:3px 12px; border-radius:12px; }
        
        #footer{ background:#fff; border-top:1px solid #ececec; padding:8px 10px calc(8px + env(safe-area-inset-bottom)); }
        .footer-nav{ display:grid; grid-template-columns: 60px 44px 44px 1.2fr 80px; gap:8px; align-items:center; }
        .btn{ border:none; border-radius:12px; display:flex; align-items:center; justify-content:center; font-weight:800; height:42px; cursor:pointer; font-size:11px; }
    </style>
</head>
<body>

<div id="lobby">
    <div class="lobby-content">
        <h2 style="text-align:center;color:var(--primary);margin:0;font-size:20px;">NEZUO ONETIME CHAT</h2>
        <div class="policy-box">
            <div class="security-point">🔒 完全末端間暗号化 (E2EE)</div>
            解析不能なAES方式。サーバー管理者すら中身を覗けません。
            <div class="security-point">💣 自動物理削除システム</div>
            最後の一人が退出した瞬間、または15分の無言放置でデータは永久抹消されます。
        </div>
        <input id="ni" class="lobby-input" maxlength="10" placeholder="名前">
        <div>
            <input id="tk" class="lobby-input" placeholder="なりすまし防止コード">
            <div id="tp" style="font-size:10px;color:var(--accent);text-align:right;height:16px;padding-right:5px;font-weight:bold;"></div>
        </div>
        <input id="ri" class="lobby-input" placeholder="部屋ID">
        <input id="pi" class="lobby-input" placeholder="パスワード">
        <button id="masterGenBtn" style="width:100%;height:36px;border:1px dashed var(--primary);background:none;border-radius:10px;color:var(--primary);cursor:pointer;font-weight:bold;">🎲 自動生成</button>
        <button id="enterBtn" style="width:100%;height:55px;border:none;border-radius:18px;background:var(--primary);color:#fff;font-size:18px;font-weight:900;cursor:pointer;">規約に同意して入室</button>
    </div>
</div>

<div id="mainApp">
    <header id="header">
        <div class="app-header-top">
            <textarea id="mi" placeholder="メッセージ..." maxlength="500"></textarea>
            <button id="sendBtn">送信</button>
        </div>
        <div class="room-info-bar">
            <div id="roomDisplay" class="info-item"></div>
            <div id="presenceList"></div>
            <div id="presenceCount" style="font-size:10px;color:#999;font-weight:bold;"></div>
        </div>
    </header>
    <main id="chatWrap"><div id="list"></div></main>
    <footer id="footer">
        <div class="footer-nav">
            <button id="focusBtn" class="btn" style="background:var(--primary);color:#fff;font-size:20px;">⌨️</button>
            <button id="toTopBtn" class="btn" style="background:#f0f2f5;">↑</button>
            <button id="toBottomBtn" class="btn" style="background:#f0f2f5;">↓</button>
            <button id="copyBtn" class="btn" style="background:var(--dark);color:#fff;">URLコピー</button>
            <button id="exitBtn" class="btn" style="background:#fff0f0;color:var(--danger);">退室</button>
        </div>
    </footer>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
import { getDatabase, ref, push, onValue, set, remove, onDisconnect, get } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyApju_6KuGq8EkXQPI0aTOysFmZ22vL5HQ",
  databaseURL: "https://nezuochat-default-rtdb.asia-southeast1.firebasedatabase.app"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const uid = crypto.randomUUID();

const $ = id => document.getElementById(id);
let curR=null, curP=null, curN=null, lastT=0, rawR="", userCount=0;
const EXPIRE_MS = 15 * 60 * 1000;

const hash = t => CryptoJS.SHA256(t).toString();
const enc = (t,k) => CryptoJS.AES.encrypt(t,k).toString();
const dec = (c,k) => { try { return CryptoJS.AES.decrypt(c,k).toString(CryptoJS.enc.Utf8) || null; } catch { return null; } };
const esc = t => (t||"").replace(/[&<>"']/g,c=>({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" }[c]));

function renderMsg(m,p){
    const decodedText = dec(m.text, p);
    if (!decodedText) return; 
    const time = new Date(m.time).toLocaleTimeString([], {hour:'2-digit',minute:'2-digit',second:'2-digit'});
    const div = document.createElement("div"); div.className="msg-wrap";
    if(m.type==="sys"){
        div.innerHTML = `<div class="sys-msg">${esc(decodedText)} (${time})</div>`;
    }else{
        const decodedName = dec(m.nEnc, p) || "???";
        div.innerHTML = `<div style="margin-left:10px;font-size:11px;font-weight:800;color:#666;">${esc(decodedName)}</div>
         <div class="msg"><div class="msg-text">${esc(decodedText).replace(/(https?:\/\/[\w\/:%#\$&\?\(\)~\.=\+\-]+)/g,'<a target="_blank" href="$1">$1</a>')}</div></div>
         <div class="msg-meta">${time}</div>`;
    }
    $("list").appendChild(div);
}

const forceExit = (reason) => { 
    $("list").innerHTML = ""; // 画面上のログを真っ先に消去
    alert(reason); 
    location.href = location.origin + location.pathname; 
};

async function join(rID,pass,name){
    rawR=rID; curR=hash(rID); curP=pass; curN=name;
    $("roomDisplay").innerText=rID; $("lobby").style.display="none"; $("mainApp").style.display="flex";
    
    const chatRef=ref(db,`chat/${curR}`), presRef=ref(db,`presence/${curR}`), myPres=ref(db,`presence/${curR}/${uid}`);
    
    const snap=await get(chatRef);
    await push(chatRef,{ type:"sys", text:enc(`${name}さんが${snap.exists()?'入室':'部屋を作成'}しました`,pass), time:Date.now() });

    onValue(presRef, (s) => {
        const users = s.val() || {};
        const activeKeys = Object.keys(users).filter(k => Date.now() - users[k].last < EXPIRE_MS);
        userCount = activeKeys.length;
        
        $("presenceList").innerHTML = "";
        activeKeys.forEach(k => {
            const dName = dec(users[k].nEnc, curP);
            if(dName){
                const span = document.createElement("span"); span.className="user-chip"; span.innerText=dName;
                $("presenceList").appendChild(span);
            }
        });
        $("presenceCount").innerText = `(${userCount}名)`;

        onDisconnect(chatRef).cancel(); onDisconnect(presRef).cancel(); onDisconnect(myPres).cancel();
        if (userCount <= 1) {
            onDisconnect(chatRef).remove(); onDisconnect(presRef).remove();
        } else {
            onDisconnect(chatRef).push({ type:"sys", text:enc(`${curN}さんが退室しました`, curP), time:Date.now() });
            onDisconnect(myPres).remove();
        }
    });

    onValue(chatRef, s => { 
        if(!s.exists()) { forceExit("部屋が消去されました。"); return; } 
        $("list").innerHTML=""; 
        const msgs = s.val() ? Object.values(s.val()) : [];
        msgs.forEach(m=>renderMsg(m,pass)); 
    });
    
    const update=()=>set(myPres,{nEnc:enc(name,pass),last:Date.now()});
    update(); setInterval(update, 20000);
    
    onValue(presRef, async (s) => {
        const now=Date.now();
        const users = s.val() || {};
        const activeIDs = Object.keys(users).filter(k => now - users[k].last < EXPIRE_MS);
        const cSnap = await get(chatRef);
        if(cSnap.exists()){
            const msgs = Object.values(cSnap.val());
            const lastT = msgs[msgs.length - 1].time;
            if(activeIDs.length === 0 || (now - lastT) > EXPIRE_MS){ 
                await remove(chatRef); await remove(presRef); 
            }
        } else if (Object.keys(users).length > 0 && activeIDs.length === 0) {
            await remove(presRef);
        }
    });
}

// 退室ボタンの挙動を強化
$("exitBtn").onclick = async () => {
    let msg = "退室しますか？";
    if(userCount <= 1) {
        msg = "あなたが最後の一人です。退室するとこの部屋と全てのログは完全に消滅し、二度と復元できません。本当によろしいですか？";
    }
    if(confirm(msg)) {
        if(userCount <= 1) {
            // 物理削除を実行してから去る
            await remove(ref(db,`chat/${curR}`));
            await remove(ref(db,`presence/${curR}`));
        }
        location.href=location.origin+location.pathname;
    }
};

$("masterGenBtn").onclick=()=>{ $("ri").value=Math.random().toString(36).slice(2,10); $("pi").value=Math.random().toString(36).slice(2,12); };
$("enterBtn").onclick=()=>{
    const r=$("ri").value.trim(), p=$("pi").value.trim(), n=$("ni").value.trim()||"名無し", t=$("tk").value.trim();
    localStorage.setItem("nez_n", n); localStorage.setItem("nez_t", t);
    if(r&&p){ join(r,p,n+$("tp").innerText); }
};
const updateTrip = async (v) => {
    if(!v){$("tp").innerText="";return;}
    const b=await crypto.subtle.digest("SHA-256",new TextEncoder().encode(v));
    $("tp").innerText="◆"+Array.from(new Uint8Array(b)).map(x=>x.toString(36)).join("").slice(2,8);
};
$("tk").oninput=(e)=>updateTrip(e.target.value);
$("mi").oninput=function(){ this.style.height="42px"; this.style.height=this.scrollHeight+"px"; };
$("mi").onkeydown=e=>{ if(e.key==="Enter"&&!e.shiftKey&&!e.isComposing){ e.preventDefault(); doSend(); } };
const doSend = async () => {
    const v=$("mi").value.trim(); if(!v||!curR||Date.now()-lastT<300) return;
    lastT=Date.now(); $("sendBtn").disabled=true;
    try{ await push(ref(db,`chat/${curR}`),{ nEnc:enc(curN,curP), text:enc(v,curP), time:Date.now() }); $("mi").value=""; $("mi").style.height="42px"; }catch(e){}
    $("sendBtn").disabled=false;
};
$("copyBtn").onclick=()=>{
    const r=rawR||$("roomDisplay").innerText; if(!r||!curP) return;
    const url = `${location.origin}${location.pathname}?r=${encodeURIComponent(r)}&p=${encodeURIComponent(curP)}`;
    const t=document.createElement("textarea"); t.value=url; document.body.appendChild(t); t.select(); document.execCommand("copy"); document.body.removeChild(t);
    $("copyBtn").innerText="OK!"; setTimeout(()=>{ $("copyBtn").innerText="URLコピー"; },1500);
};
$("toBottomBtn").onclick=()=>$("chatWrap").scrollTop=$("chatWrap").scrollHeight;
$("toTopBtn").onclick=()=>$("chatWrap").scrollTop=0;
$("focusBtn").onclick=()=>$("mi").focus();
window.onload=()=>{
    const sN = localStorage.getItem("nez_n"), sT = localStorage.getItem("nez_t");
    if(sN) $("ni").value = sN;
    if(sT){ $("tk").value = sT; updateTrip(sT); }
    const u=new URLSearchParams(window.location.search), r=u.get('r'), p=u.get('p');
    if(r&&p){ $("ri").value=r; $("pi").value=p; }
};
</script>
</body>
</html>
